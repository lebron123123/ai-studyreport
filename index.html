<style>
  :root{
    --paper:#EEECE4; --paper-card:#FBFAF6; --ink:#22282B; --ink-soft:#5B6265;
    --blueprint:#1F3A5F; --blueprint-dim:#3E5A7A; --line:#C9C5B8;
    --seal-red:#B7302B; --seal-red-dim:#B7302B55;
    --mono:"SF Mono","Consolas","Courier New",monospace;
    --serif:"Songti SC","STSong","SimSun","Noto Serif SC",serif;
    --sans:"PingFang SC","Microsoft YaHei","Hiragino Sans GB",sans-serif;
  }
  *{box-sizing:border-box;}
  body{margin:0; background:var(--paper); color:var(--ink); font-family:var(--sans); -webkit-font-smoothing:antialiased;}
  .app{display:flex; min-height:640px;}
  .toc{width:220px; flex-shrink:0; background:var(--paper); border-right:1px solid var(--line); padding:28px 0 28px 28px;}
  .toc-title{font-family:var(--serif); font-size:15px; letter-spacing:2px; color:var(--blueprint); margin-bottom:22px; padding-right:20px; border-bottom:1px solid var(--line); padding-bottom:14px;}
  .toc-item{display:flex; gap:10px; align-items:flex-start; padding:9px 20px 9px 0; font-size:13px; color:var(--ink-soft); position:relative;}
  .toc-item .num{font-family:var(--mono); font-size:11px; color:var(--line); flex-shrink:0; padding-top:1px;}
  .toc-item.active{color:var(--blueprint); font-weight:600;}
  .toc-item.active .num{color:var(--blueprint);}
  .toc-item.done .num{color:var(--blueprint-dim);}
  .sheet-wrap{flex:1; padding:36px 40px;}
  .sheet{background:var(--paper-card); max-width:820px; margin:0 auto; border:1px solid var(--line); box-shadow:0 1px 0 var(--line); padding:40px 48px; position:relative; min-height:560px;}
  .doc-eyebrow{font-family:var(--mono); font-size:11px; letter-spacing:1.5px; color:var(--blueprint-dim); text-transform:uppercase; margin-bottom:6px;}
  h1.doc-title{font-family:var(--serif); font-size:26px; margin:0 0 26px; color:var(--ink); font-weight:700; border-bottom:2px solid var(--blueprint); padding-bottom:16px;}
  label{display:block; font-size:12.5px; color:var(--ink-soft); margin:16px 0 6px;}
  input[type=text],input[type=number],select,textarea{width:100%; font-family:var(--sans); font-size:14px; color:var(--ink); background:#fff; border:1px solid var(--line); padding:9px 11px; outline:none;}
  input:focus,select:focus,textarea:focus{border-color:var(--blueprint);}
  textarea{min-height:76px; resize:vertical;}
  .grid2{display:grid; grid-template-columns:1fr 1fr; gap:0 20px;}
  .btn{font-family:var(--sans); font-size:13.5px; font-weight:600; padding:11px 22px; border:none; background:var(--blueprint); color:#fff; cursor:pointer; letter-spacing:.5px;}
  .btn:hover{background:var(--blueprint-dim);}
  .btn.ghost{background:transparent; color:var(--blueprint); border:1px solid var(--blueprint);}
  .btn.ghost:hover{background:var(--blueprint); color:#fff;}
  .btn:disabled{background:var(--line); color:#888; cursor:not-allowed;}
  .actions{margin-top:30px; display:flex; gap:12px; justify-content:flex-end; flex-wrap:wrap;}
  .note-box{margin-top:22px; background:#F1EEE4; border-left:3px solid var(--blueprint); padding:12px 16px; font-size:12.5px; color:var(--ink-soft); line-height:1.6;}
  .domain-grid{display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-top:10px;}
  .domain-card{border:1.5px solid var(--line); padding:18px 20px; cursor:pointer; background:#fff; transition:.15s;}
  .domain-card:hover{border-color:var(--blueprint-dim);}
  .domain-card.sel{border-color:var(--blueprint); background:#F4F1E8;}
  .domain-card .dn{font-family:var(--serif); font-size:16px; color:var(--ink); margin-bottom:6px;}
  .domain-card .dd{font-size:12px; color:var(--ink-soft); line-height:1.55;}
  .domain-card .dc{font-family:var(--mono); font-size:10.5px; color:var(--blueprint-dim); margin-top:8px;}
  .chapter-list{margin-top:8px;}
  .chapter-row{display:flex; align-items:center; gap:12px; padding:11px 4px; border-bottom:1px solid var(--line); font-size:14px;}
  .chapter-row .num{font-family:var(--mono); color:var(--blueprint-dim); font-size:12px; width:26px;}
  .chapter-row input[type=checkbox]{width:16px; height:16px; accent-color:var(--blueprint);}
  .chapter-row .subcount{margin-left:auto; font-family:var(--mono); font-size:10px; color:var(--ink-soft); border:1px solid var(--line); padding:2px 6px;}
  .progress-line{font-family:var(--mono); font-size:12px; color:var(--blueprint-dim); margin-bottom:18px;}
  .chapter-block{margin-bottom:30px;}
  .chapter-block h3{font-family:var(--serif); font-size:17px; color:var(--ink); margin:0 0 4px; display:flex; align-items:center; gap:8px; border-bottom:1px solid var(--line); padding-bottom:6px;}
  .chapter-block h3 .cn{font-family:var(--mono); font-size:12px; color:var(--blueprint);}
  .section-block{margin:14px 0 0;}
  .section-block h4{font-family:var(--sans); font-weight:600; font-size:14px; color:var(--blueprint-dim); margin:0 0 6px;}
  .section-block .body{font-size:13.5px; line-height:1.85; color:var(--ink); outline:none; border-left:2px solid transparent; padding-left:10px;}
  .section-block .body:focus{border-left-color:var(--blueprint); background:#F7F5EE;}
  .section-block.pending .body{color:var(--ink-soft); font-style:italic;}
  .data-flag{display:inline-block; font-family:var(--mono); font-size:10px; color:var(--seal-red); border:1px dashed var(--seal-red-dim); padding:1px 6px; margin-top:6px;}
  table.rpt{border-collapse:collapse; width:100%; margin:10px 0; font-size:12.5px;}
  table.rpt th,table.rpt td{border:1px solid var(--line); padding:5px 8px; text-align:left;}
  table.rpt th{background:#EDEAE0; font-weight:600;}
  .watermark{position:absolute; top:18px; right:-8px; transform:rotate(8deg); font-family:var(--mono); font-size:11px; letter-spacing:2px; color:var(--seal-red); border:1.5px solid var(--seal-red); padding:4px 10px; opacity:.75;}
  .seal{position:absolute; bottom:38px; right:52px; width:104px; height:104px; border-radius:50%; border:2.5px solid var(--seal-red); color:var(--seal-red); display:flex; align-items:center; justify-content:center; text-align:center; font-family:var(--serif); font-size:12px; line-height:1.4; transform:rotate(-8deg); opacity:.9;}
  .step-desc{font-size:13px; color:var(--ink-soft); margin-bottom:20px; line-height:1.6;}
  .final-banner{display:flex; justify-content:space-between; align-items:center; background:#EAF1EA; border:1px solid #5C8A5C; padding:12px 16px; margin-top:18px; font-size:13px; color:#2F5C2F;}
</style>

<div class="app">
  <div class="toc"><div class="toc-title">生成流程</div><div id="tocList"></div></div>
  <div class="sheet-wrap"><div class="sheet" id="sheet"></div></div>
</div>

<script src="outlines.js"></script>
<script src="nrcalc.js"></script>
<script>
const STEPS = ["选择领域","项目信息","财务测算","章节范围","逐章生成","复核与签发"];
let currentStep = 0;
let domainKey = null;
let chapters = [];
let signed = false;
let calcResult = null;   // 财务测算结果（null表示跳过测算，走"待填"模式）
let calcParams = null;
const project = { name:"", owner:"", industry:"", location:"", type:"", scale:"", desc:"" };

function loadDomain(key){
  domainKey = key;
  const src = window.OUTLINES[key];
  project.industry = src.label;
  chapters = src.chapters.map(ch=>({
    cn: ch.cn, name: ch.name, checked: true,
    sections: ch.sections.map(s=>({ t: s.t, numeric: !!s.numeric, content: "" }))
  }));
}

function renderTOC(){
  document.getElementById("tocList").innerHTML = STEPS.map((s,i)=>{
    const cls = i===currentStep?"active":(i<currentStep?"done":"");
    return '<div class="toc-item '+cls+'"><span class="num">'+String(i+1).padStart(2,'0')+'</span><span>'+s+'</span></div>';
  }).join("");
}

function renderSheet(){
  const sheet = document.getElementById("sheet");
  if(currentStep===0) sheet.innerHTML = stepDomain();
  if(currentStep===1) sheet.innerHTML = stepProjectInfo();
  if(currentStep===2) sheet.innerHTML = stepCalc();
  if(currentStep===3) sheet.innerHTML = stepChapters();
  if(currentStep===4) sheet.innerHTML = stepGenerate();
  if(currentStep===5) sheet.innerHTML = stepReview();
  bindEvents();
}

function stepDomain(){
  const keys = Object.keys(window.OUTLINES);
  return '<div class="doc-eyebrow">STEP 01 · 选择报告领域</div>'
    +'<h1 class="doc-title">选择要生成的可研报告类型</h1>'
    +'<div class="step-desc">不同领域使用不同的专属章节大纲。以下大纲结构参照真实可研报告提炼，每章包含多个子标题，逐层生成，篇幅与深度贴近正式报告。</div>'
    +'<div class="domain-grid">'
    + keys.map(k=>{
        const d = window.OUTLINES[k];
        const subCount = d.chapters.reduce((n,c)=>n+c.sections.length,0);
        return '<div class="domain-card '+(domainKey===k?'sel':'')+'" data-key="'+k+'">'
          +'<div class="dn">'+d.label+'</div>'
          +'<div class="dd">共 '+d.chapters.length+' 个一级章节</div>'
          +'<div class="dc">'+subCount+' 个子标题 · 逐层生成</div></div>';
      }).join("")
    +'</div>'
    +'<div class="note-box">升级说明：本版本相比旧版，把"一章一段"改为"一章按多个子标题逐层撰写"，单份报告的结构颗粒度和篇幅大幅提升；数据类子标题会自动生成表格框架并标注"待填真实数据"。</div>'
    +'<div class="actions"><button class="btn" id="toStep1" '+(domainKey?'':'disabled')+'>下一步：录入项目信息 →</button></div>';
}

function stepProjectInfo(){
  return '<div class="doc-eyebrow">STEP 02 · 项目基础信息 · '+project.industry+'</div>'
    +'<h1 class="doc-title">可行性研究报告 · 生成任务单</h1>'
    +'<div class="step-desc">录入项目基础事实。信息越具体，逐章生成的贴合度越高。</div>'
    +'<div class="grid2">'
    +'<div><label>项目名称</label><input id="f_name" type="text" placeholder="例：XX保障性住房改造升级项目" value="'+project.name+'"></div>'
    +'<div><label>建设/委托单位</label><input id="f_owner" type="text" placeholder="例：XX安居集团有限公司" value="'+project.owner+'"></div></div>'
    +'<div class="grid2">'
    +'<div><label>项目类型</label><input id="f_type" type="text" placeholder="例：改造升级 / 新建" value="'+project.type+'"></div>'
    +'<div><label>建设地点</label><input id="f_location" type="text" placeholder="例：深圳市龙华区XX片区" value="'+project.location+'"></div></div>'
    +'<div><label>投资规模（万元，估算）</label><input id="f_scale" type="text" placeholder="例：5240" value="'+project.scale+'"></div>'
    +'<label>项目概况（建筑面积、现状、改造/建设内容、周边情况等，越详细越好）</label>'
    +'<textarea id="f_desc" placeholder="例：项目总建筑面积21300㎡，含集中商业与街区商业，已运营11年，现出租率下滑至70%，拟通过系统性改造升级重构业态与动线...">'+project.desc+'</textarea>'
    +'<div class="note-box">边界提示：涉及投资估算、经营收入、财务指标等具体数字的子章节，系统只生成结构与表格框架，并标注"待填真实数据"，不会编造看似权威的精确数字。这些必须由专业测算填入后方可正式使用。</div>'
    +'<div class="actions"><button class="btn ghost" id="backStep0">← 上一步</button><button class="btn" id="toStep2">下一步：选择章节 →</button></div>';
}


function stepCalc(){
  const isGaibao = domainKey==="baozhang_gaibao";
  return '<div class="doc-eyebrow">STEP 03 · 财务测算 · '+project.industry+'</div>'
    +'<h1 class="doc-title">财务测算（可选）</h1>'
    +'<div class="step-desc">'
    +(isGaibao
      ? '填入真实测算参数后点击"执行测算"，系统将用与内部测算器完全一致的公式，当场算出收入、成本、税金、损益、现金流、IRR与净现值，并把<b>真实测算结果自动写入报告的财务章节</b>。也可以点"跳过测算"，财务章节将以"待填"框架生成。'
      : '当前"保障房·新建"领域的测算模块正在建设中，本步骤可直接跳过；财务章节将以"待填"框架生成。')
    +'</div>'
    + (isGaibao ? calcFormHtml() : '')
    +'<div id="calcResultBox">'+(calcResult? calcResultHtml():'')+'</div>'
    +'<div class="actions">'
    +'<button class="btn ghost" id="backStep1c">← 上一步</button>'
    +(isGaibao?'<button class="btn ghost" id="runCalcBtn">执行测算</button>':'')
    +'<button class="btn" id="toStep3c">'+(calcResult?'下一步：选择章节 →':'跳过测算，下一步 →')+'</button>'
    +'</div>';
}

function calcFormHtml(){
  const v = calcParams || {};
  const g = (k,d)=> v[k]!==undefined? v[k]: d;
  return ''
  +'<div class="grid2">'
  +'<div><label>建设期起始年</label><input id="c_buildStart" type="number" value="'+g("buildStart",2026)+'"></div>'
  +'<div><label>建设期年数</label><input id="c_buildYears" type="number" value="'+g("buildYears",1)+'"></div>'
  +'</div><div class="grid2">'
  +'<div><label>运营期年数</label><input id="c_operateYears" type="number" value="'+g("operateYears",12)+'"></div>'
  +'<div><label>运营首年实际月数</label><input id="c_firstMonths" type="number" value="'+g("firstMonths",12)+'"></div>'
  +'</div><div class="grid2">'
  +'<div><label>住宅面积（㎡）</label><input id="c_area" type="number" value="'+g("area",20000)+'"></div>'
  +'<div><label>起始租金（元/㎡/月）</label><input id="c_rent" type="number" step="0.1" value="'+g("rent",75)+'"></div>'
  +'</div><div class="grid2">'
  +'<div><label>租金递增跨度（年）</label><input id="c_rentSpan" type="number" value="'+g("rentSpan",3)+'"></div>'
  +'<div><label>租金递增率（%）</label><input id="c_rentRate" type="number" step="0.1" value="'+g("rentRate",5)+'"></div>'
  +'</div><div class="grid2">'
  +'<div><label>首年出租率（爬坡）</label><input id="c_rampOcc" type="number" step="0.01" value="'+g("rampOcc",0.85)+'"></div>'
  +'<div><label>稳定期出租率</label><input id="c_stableOcc" type="number" step="0.01" value="'+g("stableOcc",0.95)+'"></div>'
  +'</div><div class="grid2">'
  +'<div><label>收楼单价（元/㎡/月）</label><input id="c_collect" type="number" step="0.1" value="'+g("collect",25)+'"></div>'
  +'<div><label>首次装修单方造价（元/㎡）</label><input id="c_deco" type="number" value="'+g("deco",1500)+'"></div>'
  +'</div><div class="grid2">'
  +'<div><label>装修间隔（年）</label><input id="c_decoInt" type="number" value="'+g("decoInt",10)+'"></div>'
  +'<div><label>二次装修成本系数</label><input id="c_decoRatio" type="number" step="0.05" value="'+g("decoRatio",0.30)+'"></div>'
  +'</div><div class="grid2">'
  +'<div><label>总套数</label><input id="c_units" type="number" value="'+g("units",500)+'"></div>'
  +'<div><label>单套月运营成本（元/套/月）</label><input id="c_unitCost" type="number" value="'+g("unitCost",800)+'"></div>'
  +'</div><div class="grid2">'
  +'<div><label>开办费（万元，首年计入）</label><input id="c_startup" type="number" value="'+g("startup",50)+'"></div>'
  +'<div><label>总借款额（万元）</label><input id="c_loan" type="number" value="'+g("loan",13892)+'"></div>'
  +'</div><div class="grid2">'
  +'<div><label>计息本金（万元）</label><input id="c_interestBase" type="number" value="'+g("interestBase",10600)+'"></div>'
  +'<div><label>利率折扣系数</label><input id="c_rateDiscount" type="number" step="0.05" value="'+g("rateDiscount",0.80)+'"></div>'
  +'</div><div class="grid2">'
  +'<div><label>贷款年利率（%）</label><input id="c_loanRate" type="number" step="0.05" value="'+g("loanRate",3.5)+'"></div>'
  +'<div><label>折现率（%）</label><input id="c_discount" type="number" step="0.5" value="'+g("discount",6)+'"></div>'
  +'</div><div class="grid2">'
  +'<div><label>年均还款额（万元/年，运营第2年起）</label><input id="c_repay" type="number" value="'+g("repay",1157.67)+'"></div>'
  +'<div></div>'
  +'</div>';
}

function readCalcForm(){
  const n = id=>parseFloat(document.getElementById(id).value)||0;
  return {
    buildStart:n("c_buildStart"), buildYears:n("c_buildYears"), operateYears:n("c_operateYears"),
    firstMonths:n("c_firstMonths"), area:n("c_area"), rent:n("c_rent"),
    rentSpan:n("c_rentSpan"), rentRate:n("c_rentRate"), rampOcc:n("c_rampOcc"), stableOcc:n("c_stableOcc"),
    collect:n("c_collect"), deco:n("c_deco"), decoInt:n("c_decoInt"), decoRatio:n("c_decoRatio"),
    units:n("c_units"), unitCost:n("c_unitCost"), startup:n("c_startup"),
    loan:n("c_loan"), interestBase:n("c_interestBase"), rateDiscount:n("c_rateDiscount"),
    loanRate:n("c_loanRate"), discount:n("c_discount"), repay:n("c_repay"),
  };
}

function runCalc(){
  calcParams = readCalcForm();
  const p = calcParams;
  const buildYearsArr = Array.from({length:p.buildYears},(_,i)=>p.buildStart+i);
  const opStart = p.buildStart + p.buildYears;
  const operateYearsArr = Array.from({length:p.operateYears},(_,i)=>opStart+i);
  const loanPlan = {}; loanPlan[p.buildStart] = p.loan;
  const repayPlan = {};
  for(let i=1;i<p.operateYears;i++){ repayPlan[opStart+i] = p.repay; }
  const ramp = {}; ramp[opStart] = p.rampOcc;
  calcResult = window.NRCalc.calc({
    buildYears:buildYearsArr, operateYears:operateYearsArr, firstOperateMonths:p.firstMonths,
    residentialArea:p.area, rentStartPrice:p.rent, rentIncreaseSpan:p.rentSpan, rentIncreaseRate:p.rentRate,
    costIncreaseSpan:1, costIncreaseRate:0,
    occupancyRamp:ramp, stableStart:opStart+1, stableEnd:operateYearsArr[operateYearsArr.length-1], occupancyStable:p.stableOcc,
    collectPrice:p.collect, decorationUnitCost:p.deco, decorationInterval:p.decoInt, redecorationRatio:p.decoRatio,
    totalUnits:p.units, unitOperateCost:p.unitCost, startupFee:p.startup,
    loanAmount:p.loan, interestBase:p.interestBase, rateDiscount:p.rateDiscount, loanAnnualRate:p.loanRate,
    loanPlan:loanPlan, repayPlan:repayPlan, discountRatePct:p.discount,
  });
  document.getElementById("calcResultBox").innerHTML = calcResultHtml();
  const nextBtn = document.getElementById("toStep3c");
  if(nextBtn) nextBtn.textContent = "下一步：选择章节 →";
}

function calcResultHtml(){
  if(!calcResult) return "";
  const s = calcResult.summary;
  const fmt = x=> x===null? "无法计算" : Number(x).toLocaleString("zh-CN",{maximumFractionDigits:2});
  const payback = s.paybackInfo? (s.paybackInfo.year+"年（第"+s.paybackInfo.index+"年）") : "全周期内未回正";
  return '<div class="note-box" style="border-left-color:#5C8A5C; background:#EAF1EA; color:#2F5C2F;">'
    +'<b>测算完成</b>　全周期总收入 '+fmt(s.totalIncome)+' 万元 ｜ 总成本 '+fmt(s.totalCost)+' 万元 ｜ 税金合计 '+fmt(s.totalTax)+' 万元 ｜ 净利润合计 '+fmt(s.totalNetProfit)+' 万元<br>'
    +'累计净现值 '+fmt(s.totalNpv)+' 万元 ｜ 全投资IRR '+(s.irr===null?"无法计算":s.irr+"%")+' ｜ 累计现金流回正 '+payback
    +'<br><span style="font-size:11px;">以上结果由内置公式实时计算（与内部Streamlit测算器口径一致），将自动写入报告财务章节。</span></div>';
}

function stepChapters(){
  return '<div class="doc-eyebrow">STEP 03 · 章节范围 · '+project.industry+'</div>'
    +'<h1 class="doc-title">选择本次生成的章节</h1>'
    +'<div class="step-desc">每个章节含多个子标题，生成时逐个撰写。取消勾选可跳过整章。</div>'
    +'<div class="chapter-list">'
    + chapters.map((c,i)=>'<div class="chapter-row"><span class="num">'+c.cn+'</span>'
        +'<input type="checkbox" data-idx="'+i+'" class="chk" '+(c.checked?'checked':'')+'>'
        +'<span>'+c.name+'</span><span class="subcount">'+c.sections.length+' 子节</span></div>').join("")
    +'</div>'
    +'<div class="actions"><button class="btn ghost" id="backStep2ch">← 上一步</button><button class="btn" id="toStep4g">下一步：开始生成 →</button></div>';
}

function stepGenerate(){

async function runGeneration(){
  const active = chapters.filter(c=>c.checked);
  const genBtn = document.getElementById("startGen");
  genBtn.disabled = true; genBtn.textContent = "生成中…";
  const progressEl = document.getElementById("progressLine");
  const total = active.reduce((n,c)=>n+c.sections.length,0);
  let done = 0;
  for(const c of active){
    for(let si=0; si<c.sections.length; si++){
      const s = c.sections[si];
      done++;
      progressEl.textContent = '正在撰写 '+done+'/'+total+'：'+c.name+' — '+s.t+' …';
      const secEl = document.getElementById('sec_'+c.cn+'_'+si);
      try{
        const text = await generateSection(c, s);
        s.content = text;
        secEl.classList.remove("pending");
        secEl.querySelector(".body").innerHTML = renderContent(text);
        if(s.numeric){
          const flag = document.createElement("div");
          flag.className = "data-flag";
          flag.textContent = "⚠ 表内数字为占位框架，正式版须替换为真实测算结果";
          secEl.appendChild(flag);
        }
      }catch(e){ secEl.querySelector(".body").textContent = "生成失败："+e.message; }
    }
  }
  progressEl.textContent = '已完成 '+total+' 个子标题的初稿起草。';
  genBtn.style.display = "none";
  document.getElementById("toStep5r").style.display = "inline-block";
}

function renderContent(text){
  const tableRe = /\[\[TABLE\]\]([\s\S]*?)\[\[\/TABLE\]\]/g;
  let html = text.replace(tableRe, function(m, inner){
    const rows = inner.trim().split("\n").filter(r=>r.trim());
    let t = '<table class="rpt">';
    rows.forEach((r,ri)=>{
      const cells = r.split("|").map(x=>x.trim());
      const tag = ri===0 ? "th" : "td";
      t += "<tr>" + cells.map(c=>'<'+tag+'>'+escapeHtml(c)+'</'+tag+'>').join("") + "</tr>";
    });
    return t + "</table>";
  });
  html = html.split(/\n{2,}/).map(p=>{
    if(p.includes("<table")) return p;
    return p.trim()? '<p style="margin:0 0 10px;">'+escapeHtml(p).replace(/\n/g,"<br>")+'</p>' : "";
  }).join("");
  return html;
}
function escapeHtml(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}


// 把测算结果整理成给AI的数据摘要 + 现成表格
function buildCalcDigest(){
  if(!calcResult) return null;
  const r = calcResult, s = r.summary, p = calcParams;
  const y0 = r.allYears[0], yN = r.allYears[r.allYears.length-1];
  const fmt = x=> Number(x).toLocaleString("zh-CN",{maximumFractionDigits:2});
  // 分年现金流表（节选前若干年+汇总）
  let cfRows = "年份|现金流入(万元)|现金流出(万元)|净现金流量(万元)|累计净现金流量(万元)\n";
  r.allYears.forEach(y=>{
    const c=r.cf[y];
    cfRows += y+"|"+fmt(c.inflow)+"|"+fmt(c.outflow)+"|"+fmt(c.net)+"|"+fmt(c.cumNet)+"\n";
  });
  let incomeRows = "年份|住宅租金收入(万元)|出租率|租金单价(元/㎡/月)\n";
  r.allYears.forEach(y=>{
    if(r.income[y].rent>0){
      incomeRows += y+"|"+fmt(r.income[y].rent)+"|"+((r.resiOccupancy[y]||0)*100).toFixed(0)+"%|"+fmt(r.resiRentPrice[y]||0)+"\n";
    }
  });
  let costRows = "年份|收楼成本(万元)|工程费用(万元)|运营费用(万元)|财务费用(万元)|总成本(万元)\n";
  r.allYears.forEach(y=>{
    const c=r.cost[y];
    if(c.total>0) costRows += y+"|"+fmt(c.collect)+"|"+fmt(c.eng)+"|"+fmt(c.op)+"|"+fmt(c.fin)+"|"+fmt(c.total)+"\n";
  });
  const digest = "【真实财务测算结果（由内置公式计算，可直接引用）】\n"
    +"测算周期："+y0+"—"+yN+"年（建设期"+p.buildYears+"年，运营期"+p.operateYears+"年）\n"
    +"核心参数：住宅面积"+fmt(p.area)+"㎡，起始租金"+p.rent+"元/㎡/月（每"+p.rentSpan+"年递增"+p.rentRate+"%），首年出租率"+(p.rampOcc*100)+"%，稳定期"+(p.stableOcc*100)+"%；收楼单价"+p.collect+"元/㎡/月；首次装修"+p.deco+"元/㎡（共装修"+s.decoTimes+"次，工程费合计"+fmt(s.totalEngCost)+"万元）；总套数"+p.units+"套，单套运营成本"+p.unitCost+"元/套/月；总借款"+fmt(p.loan)+"万元（计息本金"+fmt(p.interestBase)+"万元，利率"+p.loanRate+"%×折扣"+p.rateDiscount+"），折现率"+p.discount+"%。\n"
    +"汇总结果：全周期总收入"+fmt(s.totalIncome)+"万元；总成本费用"+fmt(s.totalCost)+"万元；税金及附加合计"+fmt(s.totalTax)+"万元；净利润合计"+fmt(s.totalNetProfit)+"万元；累计净现值"+fmt(s.totalNpv)+"万元；全投资内部收益率IRR为"+(s.irr===null?"无法计算":s.irr+"%")+"；累计净现金流"+(s.paybackInfo?("于"+s.paybackInfo.year+"年（第"+s.paybackInfo.index+"年）回正"):"全周期内未回正")+"。\n"
    +"\n分年收入明细：\n"+incomeRows
    +"\n分年成本明细：\n"+costRows
    +"\n分年现金流量：\n"+cfRows;
  return digest;
}

async function generateSection(c, s){
  const digest = s.numeric ? buildCalcDigest() : null;
  let tableHint = "";
  if(s.numeric && digest){
    tableHint = '\n本子标题涉及财务数字。下面提供了本项目由内置公式实际计算出的真实测算结果，请：①严格依据这些真实数字撰写分析（数字直接引用，不得改动、不得另行编造）；②在正文中生成1-2个数据表格支撑论述，表格用如下格式包裹（表头行在第一行，单元格用竖线|分隔）：\n[[TABLE]]\n列1|列2|列3\n行1|数值|数值\n[[/TABLE]]\n表格数据从测算结果中选取，允许按年份归并或取关键年份，但数值必须与测算结果一致。\n\n'+digest;
  } else if(s.numeric){
    tableHint = '\n本子标题涉及具体数字或测算，请：①用文字说明测算口径、方法与逻辑；②生成一个结构完整的数据表格，表格用如下格式包裹（表头行在第一行，单元格用竖线|分隔，每行一个换行）：\n[[TABLE]]\n列1|列2|列3\n项目A|待填|待填\n[[/TABLE]]\n表格中的具体数值一律填"待填"，绝不编造精确数字；但表格的行项目、列结构要专业完整、贴合真实可研报告。';
  }
  const sys = '你是一名资深工程咨询工程师，专门撰写政府投资项目和国企项目的可行性研究报告，尤其擅长保障性住房与商业配套改造类项目。请以正式、严谨的官方文书语言撰写，逻辑缜密、层次分明，术语准确，避免口语化和空洞套话。\n要求：\n1. 只依据用户提供的项目信息展开，不得编造项目未提及的具体事实（如虚构的地名、单位名、政策文号）。\n2. 涉及具体金额、比率、财务指标（回报率/IRR/NPV/坪效等）时：若用户消息中提供了【真实财务测算结果】，则严格引用其中的数字，不得改动或另行编造；若未提供，则绝不给出看似权威的精确数字，一律以"待填"标注。\n3. 参照真实可研报告的深度：有分点论述、有逻辑递进、有专业分析，不要泛泛而谈。篇幅约500-800字。\n4. 直接输出该子标题下的正文内容，不要重复子标题，不要客套语，不要"以下是"之类的开场白。'+tableHint;
  const user = '【项目信息】\n项目名称：'+(project.name||"（未填写）")+'\n建设/委托单位：'+(project.owner||"（未填写）")+'\n报告领域：'+project.industry+'\n项目类型：'+(project.type||"（未填写）")+'\n建设地点：'+(project.location||"（未填写）")+'\n投资规模：'+(project.scale?project.scale+"万元":"（未填写）")+'\n项目概况：'+(project.desc||"（未填写）")+'\n\n【当前撰写位置】\n报告章节：'+c.cn+'、'+c.name+'\n本子标题：'+s.t+'\n\n请撰写"'+s.t+'"这一子标题下的正文。';
  const resp = await fetch("/api/generate", {
    method:"POST",
    headers:{"Content-Type":"application/json","X-Access-Code":sessionStorage.getItem("accessCode")||""},
    body: JSON.stringify({ system: sys, messages:[{role:"user", content:user}] })
  });
  const data = await resp.json();
  if(data.error) throw new Error(data.error);
  const text = (data.content||[]).map(b=>b.text||"").join("").trim();
  return text || "（未返回内容）";
}

function calcAppendixHtml(){
  if(!calcResult) return "";
  const r=calcResult, s=r.summary;
  const fmt=x=>Number(x).toLocaleString("zh-CN",{maximumFractionDigits:2});
  const th='style="border:1px solid #000; padding:3px 6px; background:#eee; font-size:9.5pt;"';
  const td='style="border:1px solid #000; padding:3px 6px; font-size:9.5pt;"';
  let t1='<table style="border-collapse:collapse; width:100%;"><tr><th '+th+'>年份</th><th '+th+'>租金收入</th><th '+th+'>总成本</th><th '+th+'>税金</th><th '+th+'>净利润</th><th '+th+'>净现金流</th><th '+th+'>累计净现金流</th></tr>';
  r.allYears.forEach(y=>{
    t1+='<tr><td '+td+'>'+y+'</td><td '+td+'>'+fmt(r.income[y].rent)+'</td><td '+td+'>'+fmt(r.cost[y].total)+'</td><td '+td+'>'+fmt(r.tax[y].total)+'</td><td '+td+'>'+fmt(r.profit[y].netProfit)+'</td><td '+td+'>'+fmt(r.cf[y].net)+'</td><td '+td+'>'+fmt(r.cf[y].cumNet)+'</td></tr>';
  });
  t1+='</table>';
  return '<h1 style="font-family:\'黑体\',\'SimHei\',sans-serif; font-size:18pt; margin-top:26pt;">附表：财务测算明细（单位：万元）</h1>'
    +'<p style="font-size:10.5pt;">全周期总收入 '+fmt(s.totalIncome)+'｜总成本 '+fmt(s.totalCost)+'｜净利润合计 '+fmt(s.totalNetProfit)+'｜累计净现值 '+fmt(s.totalNpv)+'｜IRR '+(s.irr===null?"无法计算":s.irr+"%")+'</p>'
    + t1;
}

function exportWord(){
  const active = chapters.filter(c=>c.checked);
  const secEls = document.querySelectorAll("#sheet .section-block");
  const elMap = {};
  secEls.forEach(el=>{ const b = el.querySelector(".body"); if(el.dataset.cn!==undefined) elMap[el.dataset.cn+'_'+el.dataset.si] = b; });
  let bodyHtml = "";
  active.forEach(c=>{
    bodyHtml += '<h1 style="font-family:\'黑体\',\'SimHei\',sans-serif; font-size:18pt; margin-top:26pt;">'+c.cn+'、'+c.name+'</h1>';
    c.sections.forEach((s,si)=>{
      const el = elMap[c.cn+'_'+si];
      const innerH = el ? el.innerHTML : renderContent(s.content||"");
      bodyHtml += '<h2 style="font-family:\'黑体\',\'SimHei\',sans-serif; font-size:14pt; margin-top:16pt;">'+s.t+'</h2>';
      bodyHtml += '<div style="font-family:\'仿宋\',\'FangSong\',serif; font-size:12pt; line-height:1.9;">'+wordifyBody(innerH)+'</div>';
    });
  });
  const metaLine = [
    project.owner?'建设/委托单位：'+project.owner:"",
    project.industry?'报告领域：'+project.industry:"",
    project.location?'建设地点：'+project.location:"",
    project.scale?'投资规模：'+project.scale+'万元':"",
  ].filter(Boolean).join("　　");
  const signNote = signed ? '本报告已经人工复核确认签发，签发日期：'+new Date().toLocaleDateString('zh-CN') : '本报告为AI生成初稿，尚未经过人工复核签发，其中标注"待填"的数据须补充真实测算结果，正式使用前须完成审核。';
  const docHtml = '<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:w="urn:schemas-microsoft-com:office:word" xmlns="http://www.w3.org/TR/REC-html40"><head><meta charset="utf-8"><title>'+(project.name||"可行性研究报告")+'</title>'
    +'<!--[if gte mso 9]><xml><w:WordDocument><w:View>Print</w:View><w:Zoom>100</w:Zoom></w:WordDocument></xml><![endif]-->'
    +'<style>table{border-collapse:collapse;} td,th{border:1px solid #000; padding:4px 8px; font-size:10.5pt; font-family:"仿宋","FangSong",serif;} th{background:#eee;}</style>'
    +'</head><body>'
    +'<h1 style="text-align:center; font-family:\'黑体\',\'SimHei\',sans-serif; font-size:24pt;">'+(project.name||"可行性研究报告")+'</h1>'
    +'<p style="text-align:center; font-size:14pt;">可 行 性 研 究 报 告</p>'
    +'<p style="text-align:center; font-size:11pt; color:#555;">'+metaLine+'</p><hr/>'
    + bodyHtml
    + calcAppendixHtml()
    +'<p style="margin-top:40pt; font-size:10.5pt; color:#888;">'+signNote+'</p></body></html>';
  const blob = new Blob(["\ufeff", docHtml], {type:"application/msword"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = (project.name||"可行性研究报告")+".doc";
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}
function wordifyBody(html){ return html.replace(/<p style="margin:0 0 10px;">/g,'<p style="text-indent:2em; margin:0 0 10pt;">'); }

function bindEvents(){

function saveProject(){

  project.location=g("f_location"); project.scale=g("f_scale"); project.desc=g("f_desc");

function checkAccess(){
  if(sessionStorage.getItem("accessCode")){ boot(); return; }
  document.body.insertAdjacentHTML("beforeend",
    '<div id="gate" style="position:fixed; inset:0; background:rgba(20,20,18,.55); display:flex; align-items:center; justify-content:center; z-index:999;">'
    +'<div style="background:var(--paper-card); border:1px solid var(--line); padding:32px 36px; width:320px;">'
    +'<div style="font-family:var(--serif); font-size:16px; margin-bottom:10px; color:var(--ink);">请输入访问口令</div>'
    +'<div style="font-size:12.5px; color:var(--ink-soft); margin-bottom:16px; line-height:1.6;">本工具消耗内部AI额度，仅限获得口令的同事使用。</div>'
    +'<input id="gateInput" type="text" style="width:100%; padding:9px 11px; border:1px solid var(--line); margin-bottom:14px;" placeholder="访问口令">'
    +'<button class="btn" style="width:100%;" id="gateBtn">进入</button>'
    +'<div id="gateErr" style="color:var(--seal-red); font-size:12px; margin-top:10px; display:none;"></div></div></div>');
  const gateBtn = document.getElementById("gateBtn");
  const doVerify = async ()=>{
    const val = document.getElementById("gateInput").value.trim();
    const errEl = document.getElementById("gateErr");
    gateBtn.disabled=true; gateBtn.textContent="校验中…"; errEl.style.display="none";
    try{
      const resp = await fetch("/api/verify",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({code:val})});
      const data = await resp.json();
      if(data.ok){ sessionStorage.setItem("accessCode",val); document.getElementById("gate").remove(); boot(); }
      else{ errEl.textContent=data.error||"口令错误"; errEl.style.display="block"; gateBtn.disabled=false; gateBtn.textContent="进入"; }
    }catch(e){ errEl.textContent="校验失败，请检查网络后重试。"; errEl.style.display="block"; gateBtn.disabled=false; gateBtn.textContent="进入"; }
  };
  gateBtn.onclick = doVerify;
  document.getElementById("gateInput").addEventListener("keydown",e=>{ if(e.key==="Enter") doVerify(); });
}
function boot(){ renderTOC(); renderSheet(); }
checkAccess();
