<meta charset="utf-8">
<style>
  :root{
    /* 蓝图·公文 配色体系 */
    --bp-deep:#132A43;        /* 图纸深蓝（侧栏底） */
    --bp-navy:#1E3A5C;        /* 主蓝 */
    --bp-line:#2C4A6E;        /* 蓝图网格线 */
    --bp-cyan:#7FB3C8;        /* 绘图青（侧栏强调/眉标） */
    --paper:#F2EFE7;          /* 环境纸色 */
    --paper-card:#FBFAF5;     /* 文档纸面 */
    --ink:#1F262B;            /* 正文墨色 */
    --ink-soft:#66707A;       /* 次级文字 */
    --line:#D8D3C4;           /* 纸面细线 */
    --line-strong:#B9B29E;
    --seal-red:#B7302B;       /* 印章朱砂 */
    --seal-red-dim:#B7302B55;
    --ok-green:#3E6B45;
    --blueprint:var(--bp-navy);       /* 兼容旧变量名 */
    --blueprint-dim:#3E5A7A;
    --mono:"SF Mono","Cascadia Mono","Consolas","Courier New",monospace;
    --serif:"Songti SC","STSong","SimSun","Noto Serif SC",serif;
    --sans:"PingFang SC","MiSans","Microsoft YaHei","Hiragino Sans GB",sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0; padding:0;}
  body{
    background:
      radial-gradient(1200px 500px at 85% -10%, #E9E4D6 0%, transparent 60%),
      var(--paper);
    color:var(--ink); font-family:var(--sans); -webkit-font-smoothing:antialiased;
  }

  .app{display:flex; min-height:100vh;}

  /* ============ 左侧：蓝图面板 ============ */
  .toc{
    width:236px; flex-shrink:0; position:relative;
    background:
      linear-gradient(rgba(255,255,255,.035) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,.035) 1px, transparent 1px),
      linear-gradient(160deg, var(--bp-deep) 0%, #0E2136 100%);
    background-size:28px 28px, 28px 28px, cover;
    border-right:none;
    padding:34px 0 34px 30px;
    box-shadow:inset -18px 0 30px -24px rgba(0,0,0,.55);
  }
  .toc::after{ /* 图纸右缘裁切线 */
    content:""; position:absolute; top:0; right:8px; bottom:0; width:1px;
    background:rgba(127,179,200,.25);
  }
  .toc-title{
    font-family:var(--serif); font-size:15px; letter-spacing:6px; color:#EDF3F6;
    margin-bottom:8px; padding-right:24px;
  }
  .toc-title::after{
    content:"FEASIBILITY STUDIO"; display:block; margin-top:7px;
    font-family:var(--mono); font-size:9px; letter-spacing:2.6px; color:var(--bp-cyan);
  }
  #tocList{position:relative; margin-top:26px; padding-right:24px;}
  #tocList::before{ /* 竖向工序轨道 */
    content:""; position:absolute; left:11px; top:14px; bottom:14px; width:1px;
    background:linear-gradient(var(--bp-cyan) 0%, rgba(127,179,200,.15) 100%);
    opacity:.45;
  }
  .toc-item{
    display:flex; gap:14px; align-items:center; padding:11px 0;
    font-size:13px; color:#8FA2B5; position:relative; transition:color .25s ease;
  }
  .toc-item .num{
    font-family:var(--mono); font-size:9.5px; flex-shrink:0;
    width:23px; height:23px; line-height:21px; text-align:center;
    border:1px solid rgba(127,179,200,.4); border-radius:50%;
    color:var(--bp-cyan); background:var(--bp-deep);
    position:relative; z-index:1; transition:all .25s ease;
  }
  .toc-item.active{color:#FFFFFF; font-weight:600;}
  .toc-item.active .num{
    background:var(--bp-cyan); color:var(--bp-deep); border-color:var(--bp-cyan);
    box-shadow:0 0 0 4px rgba(127,179,200,.18);
  }
  .toc-item.done{color:#B9C8D6;}
  .toc-item.done .num{
    border-color:var(--bp-cyan); color:var(--bp-deep); background:var(--bp-cyan);
    opacity:.55;
  }

  /* ============ 右侧：文档纸面 ============ */
  .sheet-wrap{flex:1; padding:44px 48px; min-width:0;}
  .sheet{
    background:var(--paper-card); max-width:860px; margin:0 auto;
    border:1px solid var(--line-strong);
    box-shadow:0 1px 2px rgba(31,38,43,.06), 0 14px 40px -18px rgba(19,42,67,.25);
    padding:44px 54px 52px; position:relative; min-height:600px;
    border-radius:2px;
  }
  .sheet::before{ /* 图签顶带 */
    content:""; position:absolute; top:0; left:0; right:0; height:6px;
    background:linear-gradient(90deg, var(--bp-navy) 0 72%, var(--seal-red) 72% 78%, var(--bp-navy) 78%);
  }

  /* 页面切换时的内容浮现 */
  .sheet > *{animation:riseIn .38s cubic-bezier(.22,.8,.36,1) both;}
  .sheet > *:nth-child(2){animation-delay:.04s;}
  .sheet > *:nth-child(3){animation-delay:.08s;}
  .sheet > *:nth-child(4){animation-delay:.12s;}
  @keyframes riseIn{from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:none;}}
  @media (prefers-reduced-motion: reduce){
    .sheet > *{animation:none;}
    *{transition:none !important;}
  }

  .doc-eyebrow{
    font-family:var(--mono); font-size:10.5px; letter-spacing:2.4px; color:var(--bp-navy);
    text-transform:uppercase; margin-bottom:10px; display:flex; align-items:center; gap:10px;
  }
  .doc-eyebrow::before{content:""; width:26px; height:1px; background:var(--seal-red);}
  h1.doc-title{
    font-family:var(--serif); font-size:28px; margin:0 0 8px; color:var(--ink); font-weight:700;
    letter-spacing:.5px; padding-bottom:14px; position:relative;
  }
  h1.doc-title::after{ /* 公文双线：粗+细 */
    content:""; position:absolute; left:0; right:0; bottom:0; height:5px;
    border-top:2.5px solid var(--bp-navy); border-bottom:1px solid var(--bp-navy);
  }
  .step-desc{font-size:13px; color:var(--ink-soft); margin:16px 0 22px; line-height:1.75; max-width:64ch;}

  label{display:block; font-size:12px; color:var(--ink-soft); margin:16px 0 6px; letter-spacing:.3px;}
  input[type=text],input[type=number],select,textarea{
    width:100%; font-family:var(--sans); font-size:14px; color:var(--ink);
    background:#FFFFFF; border:1px solid var(--line); border-radius:2px;
    padding:10px 12px; outline:none;
    transition:border-color .18s ease, box-shadow .18s ease;
  }
  input:focus,select:focus,textarea:focus{
    border-color:var(--bp-navy);
    box-shadow:0 0 0 3px rgba(30,58,92,.12);
  }
  textarea{min-height:80px; resize:vertical;}
  .grid2{display:grid; grid-template-columns:1fr 1fr; gap:0 22px;}

  .btn{
    font-family:var(--sans); font-size:13.5px; font-weight:600; padding:12px 26px;
    border:1px solid var(--bp-navy); border-radius:2px;
    background:linear-gradient(180deg, #24466E, var(--bp-navy));
    color:#fff; cursor:pointer; letter-spacing:1px;
    box-shadow:0 2px 0 rgba(19,42,67,.35);
    transition:transform .15s ease, box-shadow .15s ease, filter .15s ease;
  }
  .btn:hover{filter:brightness(1.08); transform:translateY(-1px); box-shadow:0 4px 10px -3px rgba(19,42,67,.45);}
  .btn:active{transform:translateY(0); box-shadow:0 1px 0 rgba(19,42,67,.35);}
  .btn:focus-visible{outline:2px solid var(--bp-cyan); outline-offset:2px;}
  .btn.ghost{background:transparent; color:var(--bp-navy); box-shadow:none;}
  .btn.ghost:hover{background:var(--bp-navy); color:#fff;}
  .btn:disabled{background:var(--line); border-color:var(--line); color:#98937F; cursor:not-allowed; box-shadow:none; transform:none;}
  .actions{margin-top:34px; display:flex; gap:12px; justify-content:flex-end; flex-wrap:wrap;}

  .note-box{
    margin-top:24px; background:#F3F0E6;
    border:1px solid var(--line); border-left:3px solid var(--bp-navy);
    padding:13px 18px; font-size:12.5px; color:var(--ink-soft); line-height:1.7; border-radius:0 2px 2px 0;
  }

  /* 领域卡片：图纸角标 */
  .domain-grid{display:grid; grid-template-columns:1fr 1fr; gap:18px; margin-top:14px;}
  .domain-card{
    position:relative; border:1px solid var(--line-strong); border-radius:2px;
    padding:22px 24px 18px; cursor:pointer; background:#FFFFFF;
    transition:transform .18s ease, box-shadow .18s ease, border-color .18s ease;
  }
  .domain-card::before,.domain-card::after{ /* 制图角标 */
    content:""; position:absolute; width:12px; height:12px; border-color:var(--bp-navy); border-style:solid; opacity:.5;
    transition:opacity .18s ease;
  }
  .domain-card::before{top:6px; left:6px; border-width:1.5px 0 0 1.5px;}
  .domain-card::after{bottom:6px; right:6px; border-width:0 1.5px 1.5px 0;}
  .domain-card:hover{transform:translateY(-3px); box-shadow:0 12px 26px -14px rgba(19,42,67,.35); border-color:var(--bp-navy);}
  .domain-card:hover::before,.domain-card:hover::after{opacity:1;}
  .domain-card.sel{
    border-color:var(--bp-navy);
    background:linear-gradient(180deg, #FDFCF8, #F3F1E8);
    box-shadow:inset 0 0 0 1px var(--bp-navy);
  }
  .domain-card.sel::before,.domain-card.sel::after{opacity:1; border-color:var(--seal-red);}
  .domain-card .dn{font-family:var(--serif); font-size:17px; color:var(--ink); margin-bottom:7px; letter-spacing:.5px;}
  .domain-card .dd{font-size:12px; color:var(--ink-soft); line-height:1.6;}
  .domain-card .dc{font-family:var(--mono); font-size:10px; letter-spacing:.5px; color:var(--bp-navy); margin-top:10px;}

  /* 章节勾选 */
  .chapter-list{margin-top:10px; border-top:1px solid var(--line-strong);}
  .chapter-row{
    display:flex; align-items:center; gap:14px; padding:12px 6px;
    border-bottom:1px solid var(--line); font-size:14px;
    transition:background .15s ease;
  }
  .chapter-row:hover{background:#F5F2E9;}
  .chapter-row .num{font-family:var(--serif); color:var(--bp-navy); font-size:13px; width:28px; font-weight:700;}
  .chapter-row input[type=checkbox]{width:16px; height:16px; accent-color:var(--bp-navy); cursor:pointer;}
  .chapter-row .subcount{
    margin-left:auto; font-family:var(--mono); font-size:9.5px; letter-spacing:.5px;
    color:var(--ink-soft); border:1px solid var(--line); border-radius:10px; padding:2px 9px; background:#FFF;
  }

  .progress-line{
    font-family:var(--mono); font-size:11.5px; color:var(--bp-navy); margin-bottom:20px;
    padding:8px 12px; background:#EFF2EE; border:1px dashed var(--bp-cyan); border-radius:2px;
  }
  .chapter-block{margin-bottom:34px;}
  .chapter-block h3{
    font-family:var(--serif); font-size:18px; color:var(--ink); margin:0 0 6px;
    display:flex; align-items:baseline; gap:10px;
    border-bottom:1px solid var(--line-strong); padding-bottom:8px;
  }
  .chapter-block h3 .cn{
    font-family:var(--serif); font-size:12px; color:#fff; background:var(--bp-navy);
    padding:2px 8px; border-radius:1px; letter-spacing:2px;
  }
  .section-block{margin:16px 0 0;}
  .section-block h4{
    font-family:var(--sans); font-weight:600; font-size:14px; color:var(--bp-navy); margin:0 0 7px;
    display:flex; align-items:center; gap:8px;
  }
  .section-block h4::before{content:""; width:5px; height:5px; background:var(--seal-red); transform:rotate(45deg); flex-shrink:0;}
  .section-block .body{
    font-size:13.5px; line-height:1.9; color:var(--ink);
    outline:none; border-left:2px solid transparent; padding-left:12px;
    transition:border-color .15s ease, background .15s ease;
  }
  .section-block .body:focus{border-left-color:var(--bp-navy); background:#F6F4EC;}
  .section-block.pending .body{color:var(--ink-soft); font-style:italic;}
  .data-flag{
    display:inline-block; font-family:var(--mono); font-size:9.5px; letter-spacing:.5px;
    color:var(--seal-red); border:1px dashed var(--seal-red-dim); border-radius:2px;
    padding:2px 8px; margin-top:8px; background:#FDF6F5;
  }

  table.rpt{border-collapse:collapse; width:100%; margin:12px 0; font-size:12.5px; background:#fff;}
  table.rpt th,table.rpt td{border:1px solid var(--line-strong); padding:6px 10px; text-align:left;}
  table.rpt th{
    background:var(--bp-navy); color:#F2F5F8; font-weight:600; letter-spacing:.5px;
    border-color:var(--bp-navy);
  }
  table.rpt tr:nth-child(even) td{background:#F7F5EE;}

  .watermark{
    position:absolute; top:22px; right:-6px; transform:rotate(7deg);
    font-family:var(--mono); font-size:11px; letter-spacing:3px; color:var(--seal-red);
    border:1.5px solid var(--seal-red); border-radius:2px; padding:5px 12px; opacity:.8; background:rgba(251,250,245,.7);
  }
  .seal{
    position:absolute; bottom:40px; right:56px; width:108px; height:108px; border-radius:50%;
    border:2.5px solid var(--seal-red); color:var(--seal-red); display:flex; align-items:center; justify-content:center;
    text-align:center; font-family:var(--serif); font-size:12px; line-height:1.45; transform:rotate(-8deg);
    opacity:.92; box-shadow:inset 0 0 0 3px rgba(183,48,43,.12);
  }
  .final-banner{
    display:flex; justify-content:space-between; align-items:center;
    background:#EAF1EA; border:1px solid var(--ok-green); border-radius:2px;
    padding:13px 18px; margin-top:20px; font-size:13px; color:var(--ok-green);
  }

  /* 移动端 */
  @media (max-width: 820px){
    .app{flex-direction:column;}
    .toc{width:100%; padding:20px 22px;}
    #tocList{display:flex; gap:4px; margin-top:14px; padding-right:0; overflow-x:auto;}
    #tocList::before{display:none;}
    .toc-item{flex-direction:column; gap:6px; padding:4px 10px; font-size:11px; text-align:center; flex-shrink:0;}
    .sheet-wrap{padding:20px 14px;}
    .sheet{padding:28px 22px 40px;}
    .grid2,.domain-grid{grid-template-columns:1fr;}
  }

  /* ===== 蓝图插画（首页） ===== */
  .hero-draft{
    position:relative; margin:2px 0 22px; border:1px solid var(--line-strong); border-radius:2px;
    background:
      linear-gradient(rgba(30,58,92,.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(30,58,92,.05) 1px, transparent 1px),
      #FDFCF8;
    background-size:18px 18px;
    padding:14px 16px 8px; overflow:hidden;
  }
  .hero-draft::after{ /* 扫描光带 */
    content:""; position:absolute; top:0; bottom:0; width:90px;
    background:linear-gradient(90deg, transparent, rgba(127,179,200,.14), transparent);
    animation:heroScan 7s linear infinite;
  }
  @keyframes heroScan{from{left:-120px;} to{left:110%;}}
  .hero-draft svg{display:block; width:100%; height:auto;}
  .hero-draft path{stroke:var(--bp-navy); stroke-width:1.6; stroke-linecap:round;}
  .hero-draft .draw{stroke-dasharray:900; stroke-dashoffset:900; animation:drawLine 1.6s ease forwards;}
  .hero-draft .d1{animation-delay:.05s;} .hero-draft .d2{animation-delay:.25s;}
  .hero-draft .d3{animation-delay:.5s;}  .hero-draft .d4{animation-delay:.75s;}
  .hero-draft .d5{animation-delay:1s;}   .hero-draft .d6{animation-delay:1.25s;}
  @keyframes drawLine{to{stroke-dashoffset:0;}}
  .hero-draft .crane-flag{fill:var(--seal-red); stroke:none; opacity:0; animation:fadeIn .5s ease 1.7s forwards;}
  @keyframes fadeIn{to{opacity:1;}}
  .hero-draft .lamp{fill:var(--seal-red); stroke:none; opacity:.15;}
  .hero-draft .l1{animation:lampGlow 3.4s ease-in-out 2s infinite;}
  .hero-draft .l2{animation:lampGlow 4.2s ease-in-out 2.6s infinite;}
  .hero-draft .l3{animation:lampGlow 3.8s ease-in-out 3.1s infinite;}
  @keyframes lampGlow{0%,100%{opacity:.15;} 50%{opacity:.9;}}
  .hero-draft .dim{stroke:var(--seal-red); stroke-width:.8; opacity:.7;}
  .hero-draft .dim-t{font-family:var(--mono); font-size:8px; letter-spacing:1.5px; fill:var(--seal-red); opacity:.8;}
  .hero-draft .anno{font-family:var(--serif); font-size:10px; fill:var(--bp-navy); opacity:.75;}
  .hero-cap{
    display:block; margin-top:8px; padding-top:7px; border-top:1px solid var(--line);
    font-family:var(--mono); font-size:9px; letter-spacing:1.5px; color:var(--ink-soft);
  }

  /* ===== 领域卡片图标 ===== */
  .dm-ico{width:38px; height:38px; margin-bottom:10px; display:block;}
  .dm-ico path{stroke:var(--bp-navy); stroke-width:1.7; stroke-linecap:round; stroke-linejoin:round; transition:stroke .18s ease;}
  .dm-ico .dm-arrow{stroke:var(--seal-red);}
  .dm-ico .dm-arrow-h{fill:var(--seal-red); stroke:none;}
  .domain-card:hover .dm-ico path{stroke:var(--bp-deep);}
  .domain-card:hover{
    background-image:
      linear-gradient(rgba(30,58,92,.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(30,58,92,.05) 1px, transparent 1px);
    background-size:16px 16px;
  }

  /* ===== 测算指标仪表盘 ===== */
  .metric-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:14px; margin-top:24px;}
  .metric{
    background:#FFF; border:1px solid var(--line-strong); border-radius:2px;
    padding:16px 18px 13px; position:relative; overflow:hidden;
  }
  .metric::before{content:""; position:absolute; top:0; left:0; right:0; height:3px; background:var(--bp-navy); opacity:.25;}
  .metric .mv{font-family:var(--mono); font-size:22px; font-weight:700; color:var(--bp-navy); letter-spacing:.5px; min-height:28px;}
  .metric .ml{font-size:11px; color:var(--ink-soft); margin-top:5px; letter-spacing:.3px;}
  .metric.hl{background:linear-gradient(165deg, #24466E, var(--bp-deep)); border-color:var(--bp-deep);}
  .metric.hl::before{background:var(--seal-red); opacity:1;}
  .metric.hl .mv{color:#FFFFFF; font-size:26px;}
  .metric.hl .ml{color:var(--bp-cyan);}

  /* ===== 侧栏城市剪影 ===== */
  .toc-sky{position:absolute; left:14px; right:20px; bottom:0; opacity:.85; pointer-events:none;}

  /* ===== 生成进度扫描 ===== */
  .progress-line{position:relative; overflow:hidden;}
  .progress-line::after{
    content:""; position:absolute; top:0; bottom:0; width:70px;
    background:linear-gradient(90deg, transparent, rgba(127,179,200,.3), transparent);
    animation:heroScan 2s linear infinite;
  }

  @media (max-width:820px){
    .metric-grid{grid-template-columns:1fr 1fr;}
    .toc-sky{display:none;}
  }
  @media (prefers-reduced-motion: reduce){
    .hero-draft .draw{animation:none; stroke-dashoffset:0;}
    .hero-draft .crane-flag{animation:none; opacity:1;}
    .hero-draft .lamp,.hero-draft::after,.progress-line::after{animation:none;}
  }


  /* ===== 现金流图表 ===== */
  .cf-chart{margin-top:18px; border:1px solid var(--line-strong); background:#FFF; border-radius:2px; padding:14px 16px 8px;}
  .cf-head{display:flex; justify-content:space-between; align-items:baseline; font-size:12px; color:var(--ink); font-weight:600; margin-bottom:8px;}
  .cf-legend{font-size:10.5px; color:var(--ink-soft); font-weight:400;}
  .cf-legend i{display:inline-block; vertical-align:middle; margin-right:4px;}
  .cf-legend .lg-bar{width:10px; height:10px; background:var(--bp-navy); opacity:.75;}
  .cf-legend .lg-line{width:14px; height:2px; background:var(--bp-cyan);}
  .cf-chart svg{display:block; width:100%; height:auto;}
  .cfaxis{stroke:var(--line-strong); stroke-width:1; stroke-dasharray:3 3;}
  .cfbar{fill:var(--bp-navy); opacity:.78; transform-box:fill-box; transform-origin:center bottom; animation:barUp .5s cubic-bezier(.2,.9,.3,1) both;}
  .cfbar.neg{fill:var(--seal-red); opacity:.6; transform-origin:center top;}
  @keyframes barUp{from{transform:scaleY(0);}}
  .cfline{fill:none; stroke:var(--bp-cyan); stroke-width:2.2; stroke-linejoin:round;
    stroke-dasharray:1600; stroke-dashoffset:1600; animation:drawLine 1.5s ease .55s forwards;}
  .cfx{font-family:var(--mono); font-size:8.5px; fill:var(--ink-soft);}
  .cfpay{fill:var(--seal-red); animation:payPulse 2.2s ease-in-out 2s infinite;}
  @keyframes payPulse{0%,100%{opacity:1;} 50%{opacity:.35;}}
  .cfpay-t{font-family:var(--serif); font-size:10px; fill:var(--seal-red);}

  /* ===== 生成骨架屏与落章 ===== */
  .skel{display:block; height:11px; margin:8px 0; border-radius:2px;
    background:linear-gradient(90deg,#EAE6D9 25%,#F6F3E9 42%,#EAE6D9 58%);
    background-size:280% 100%; animation:skelMove 1.8s linear infinite;}
  .section-block.gen .skel{
    background:linear-gradient(90deg,#D9E2EA 25%,#EFF5F9 42%,#D9E2EA 58%);
    background-size:280% 100%; animation:skelMove .85s linear infinite;}
  @keyframes skelMove{from{background-position:130% 0;} to{background-position:-130% 0;}}
  .section-block.gen h4::after{
    content:"绘制中"; font-family:var(--mono); font-size:9px; letter-spacing:1px;
    color:var(--seal-red); border:1px solid var(--seal-red-dim); border-radius:2px;
    padding:1px 7px; margin-left:4px; animation:blinkSoft 1.1s ease-in-out infinite;}
  @keyframes blinkSoft{50%{opacity:.3;}}
  .done-stamp{

  /* ===== 签发盖章动画 ===== */

  table.dt th.dt-sum{background:var(--bp-deep) !important; color:#fff;}

  /* ===== AI定向修改条 ===== */

<script>
function saveProject(){
  readKbFromDom();
  const g=id=>{const e=document.getElementById(id);return e?e.value:"";};
  project.name=g("f_name"); project.owner=g("f_owner"); project.type=g("f_type");
  project.location=g("f_location"); project.scale=g("f_scale"); project.desc=g("f_desc");
  readCpFromDom();
  project.poiDesc=g("f_poiDesc");
  if(document.getElementById("poiKw")) project.poiKw=document.getElementById("poiKw").value.trim();
  project.targetGroup=g("f_targetGroup"); project.industryDesc=g("f_industryDesc");
  project.unitPlan=g("f_unitPlan"); project.rentPlan=g("f_rentPlan");
}

/* ================= 账号体系 ================= */
function getToken(){ try{ return localStorage.getItem("fs_token"); }catch(e){ return null; } }
function getUser(){ try{ return localStorage.getItem("fs_user"); }catch(e){ return null; } }
function setAuth(t,u){ try{ localStorage.setItem("fs_token",t); localStorage.setItem("fs_user",u); }catch(e){} }
function clearAuth(){ try{ localStorage.removeItem("fs_token"); localStorage.removeItem("fs_user"); }catch(e){} }
function authHeaders(){ const t=getToken(); return t? {"Authorization":"Bearer "+t} : {}; }

function showLoginModal(msg){
  if(document.getElementById("gate")) return;
  document.body.insertAdjacentHTML("beforeend",
    '<div id="gate" style="position:fixed; inset:0; background:rgba(14,28,44,.62); backdrop-filter:blur(4px); display:flex; align-items:center; justify-content:center; z-index:999;">'
    +'<div style="background:var(--paper-card); border:1px solid var(--line-strong); border-top:5px solid var(--bp-navy); border-radius:2px; box-shadow:0 24px 60px -18px rgba(0,0,0,.5); padding:30px 34px; width:340px;">'
    +'<div class="auth-tabs"><button class="at-btn active" data-m="login">登 录</button><button class="at-btn" data-m="register">注 册</button></div>'
    +(msg?'<div style="font-size:12px; color:var(--seal-red); margin-bottom:10px;">'+msg+'</div>':'')
    +'<label style="margin-top:4px;">用户名</label><input id="auName" type="text" placeholder="2-20位中英文/数字">'
    +'<label>密码</label><input id="auPass" type="password" placeholder="至少6位">'
    +'<div id="auInviteWrap" style="display:none;"><label>注册邀请码</label><input id="auInvite" type="text" placeholder="向管理员索取"></div>'
    +'<button class="btn" style="width:100%; margin-top:18px;" id="auSubmit">登 录</button>'
    +'<div id="auErr" style="color:var(--seal-red); font-size:12px; margin-top:10px; display:none;"></div>'
    +'</div></div>');
  let mode = "login";
  document.querySelectorAll(".at-btn").forEach(b=>{
    b.onclick = ()=>{
      mode = b.dataset.m;
      document.querySelectorAll(".at-btn").forEach(x=>x.classList.toggle("active", x===b));
      document.getElementById("auInviteWrap").style.display = mode==="register"? "block":"none";
      document.getElementById("auSubmit").textContent = mode==="register"? "注 册":"登 录";
    };
  });
  const submit = async ()=>{
    const btn = document.getElementById("auSubmit");
    const errEl = document.getElementById("auErr");
    btn.disabled = true; btn.textContent = "请稍候…"; errEl.style.display="none";
    try{
      const resp = await fetch("/api/auth", {method:"POST", headers:{"Content-Type":"application/json"},
        body: JSON.stringify({action:mode,
          username: document.getElementById("auName").value.trim(),
          password: document.getElementById("auPass").value,
          invite: mode==="register"? document.getElementById("auInvite").value.trim() : undefined })});
      const data = await resp.json();
      if(data.ok){ setAuth(data.token, data.username); document.getElementById("gate").remove(); startApp(); }
      else{ errEl.textContent = data.error||"操作失败"; errEl.style.display="block"; btn.disabled=false; btn.textContent = mode==="register"?"注 册":"登 录"; }
    }catch(e){ errEl.textContent="网络错误，请重试"; errEl.style.display="block"; btn.disabled=false; btn.textContent = mode==="register"?"注 册":"登 录"; }
  };
  document.getElementById("auSubmit").onclick = submit;
  document.getElementById("auPass").addEventListener("keydown", e=>{ if(e.key==="Enter") submit(); });
}

/* ================= 云端项目库 ================= */
let currentProjectId = null;
let cloudTimer = null;
function genProjectId(){
  try{ return crypto.randomUUID(); }catch(e){
    return "p-"+Date.now().toString(36)+"-"+Math.random().toString(36).slice(2,10);
  }
}
function scheduleCloudSave(){
  if(!getToken()) return;
  clearTimeout(cloudTimer);
  cloudTimer = setTimeout(cloudSaveNow, 1200);
}
async function cloudSaveNow(){
  if(!getToken()) return;
  if(!currentProjectId) currentProjectId = genProjectId();
  setSaveState("saving");
  try{
    const resp = await fetch("/api/projects", {method:"POST",
      headers: Object.assign({"Content-Type":"application/json"}, authHeaders()),
      body: JSON.stringify({id:currentProjectId, name:project.name||"未命名项目", data:buildDraftData()})});
    if(resp.status===401){ setSaveState("err"); clearAuth(); showLoginModal("登录已过期，请重新登录（本地草稿仍在）"); return; }
    const d = await resp.json();
    setSaveState(d.ok? "ok":"err");
  }catch(e){ setSaveState("err"); }
}
function setSaveState(st){
  const el = document.getElementById("saveState");
  if(!el) return;
  el.textContent = st==="saving"? "云端保存中…" : st==="ok"? "已保存到云端" : "云端保存失败（本地已存）";
  el.style.color = st==="err"? "var(--seal-red)" : "";
}

function mountUserBar(){
  if(document.getElementById("userBar")) return;
  document.querySelector(".sheet-wrap").insertAdjacentHTML("afterbegin",
    '<div id="userBar" class="user-bar">'
    +'<span class="ub-user">'+ (getUser()||"") +'</span>'
    +'<span id="saveState" class="ub-save"></span>'
    +'<span class="ub-acts">'
    +'<button class="ub-btn" id="ubProjects">我的项目</button>'
    +'<button class="ub-btn" id="ubNew">新建项目</button>'
    +'<button class="ub-btn" id="ubLogout">退出</button>'
    +'</span></div>');
  document.getElementById("ubLogout").onclick = ()=>{ clearAuth(); location.reload(); };
  document.getElementById("ubNew").onclick = ()=>{
    if(!confirm("开始一个全新项目？当前项目已自动保存到云端。")) return;
    newProject();
  };
  document.getElementById("ubProjects").onclick = openProjectsPanel;
}
function newProject(){
  currentProjectId = null; domainKey = null; chapters = []; signed = false;
  calcParams = null; calcResult = null; docNo = null;
  Object.keys(project).forEach(k=>project[k]="");
  kbEntries = [];
  currentStep = 0; clearDraft();
  renderTOC(); renderSheet();
}
async function openProjectsPanel(){
  const old = document.getElementById("projPanel"); if(old) old.remove();
  document.body.insertAdjacentHTML("beforeend",
    '<div id="projPanel" class="proj-overlay"><div class="proj-panel">'
    +'<div class="pp-head">我的项目<button class="pp-close" id="ppClose">×</button></div>'
    +'<div class="pp-list" id="ppList">加载中…</div></div></div>');
  document.getElementById("ppClose").onclick = ()=>document.getElementById("projPanel").remove();
  document.getElementById("projPanel").onclick = e=>{ if(e.target.id==="projPanel") e.target.remove(); };
  try{
    const resp = await fetch("/api/projects", {headers: authHeaders()});
    if(resp.status===401){ document.getElementById("projPanel").remove(); clearAuth(); showLoginModal("登录已过期，请重新登录"); return; }
    const d = await resp.json();
    const list = d.list||[];
    const el = document.getElementById("ppList");
    if(!list.length){ el.innerHTML = '<div class="pp-empty">还没有云端项目。开始编辑后会自动保存到这里。</div>'; return; }
    el.innerHTML = list.map(p=>{
      const t = new Date(p.updated_at);
      const when = t.toLocaleDateString("zh-CN")+" "+String(t.getHours()).padStart(2,"0")+":"+String(t.getMinutes()).padStart(2,"0");
      return '<div class="pp-row"><div class="pp-info"><div class="pp-name">'+escapeHtml(p.name||"未命名项目")+'</div><div class="pp-time">'+when+'</div></div>'
        +'<div class="pp-ops"><button class="ub-btn" data-open="'+p.id+'">打开</button><button class="ub-btn pp-del" data-del="'+p.id+'">删除</button></div></div>';
    }).join("");
    el.querySelectorAll("[data-open]").forEach(b=>{ b.onclick = ()=>openProject(b.dataset.open); });
    el.querySelectorAll("[data-del]").forEach(b=>{
      b.onclick = async ()=>{
        if(!confirm("确定删除该项目？此操作不可恢复。")) return;
        await fetch("/api/projects?id="+encodeURIComponent(b.dataset.del), {method:"DELETE", headers:authHeaders()});
        openProjectsPanel();
      };
    });
  }catch(e){ document.getElementById("ppList").textContent = "加载失败，请重试"; }
}
async function openProject(id){
  try{
    const resp = await fetch("/api/projects?id="+encodeURIComponent(id), {headers:authHeaders()});
    const d = await resp.json();
    if(!d.ok){ alert(d.error||"打开失败"); return; }
    currentProjectId = id;
    const panel = document.getElementById("projPanel"); if(panel) panel.remove();
    const bar = document.getElementById("draftBar"); if(bar) bar.remove();
    restoreDraft(d.project.data);
  }catch(e){ alert("打开失败，请重试"); }
}

async function startApp(){
  mountUserBar();
  renderTOC(); renderSheet();
  await Promise.all([fetchOutlines(), fetchCalcConfig()]);
  renderTOC(); renderSheet();
  const d = loadDraft();
  if(d && d.ts && !currentProjectId && (d.project&&d.project.name || (d.chapters||[]).some(c=>c.sections.some(s=>s.content)))){
    document.querySelector(".sheet-wrap").insertAdjacentHTML("beforeend", "");
    const bar = document.getElementById("draftBar");
    if(!bar){
      document.getElementById("userBar").insertAdjacentHTML("afterend", draftBarHtml(d));
      document.getElementById("draftRestore").onclick = ()=>{ document.getElementById("draftBar").remove(); restoreDraft(d); };
      document.getElementById("draftDiscard").onclick = ()=>{ clearDraft(); document.getElementById("draftBar").remove(); };
    }
  }
}
function checkLogin(){
  if(getToken()){ startApp(); }
  else{ renderTOC(); renderSheet(); showLoginModal(); }
}
checkLogin();
</script>
