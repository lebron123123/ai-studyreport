function authHeaders(){ const t=getToken(); const h = t? {"Authorization":"Bearer "+t,"Content-Type":"application/json"}:{"Content-Type":"application/json"}; const ap = sessionStorage.getItem("adminPass"); if(ap) h["x-admin-pass"]=ap; return h; }

/* ===== 管理员二次密码门 ===== */
async function adminGate(){
  // 已有本会话密码则先静默验证
  const cached = sessionStorage.getItem("adminPass");
  try{
    const r = await fetch("/api/adminpass",{method:"POST",headers:authHeaders(),body:JSON.stringify({pass:cached||""})});
    const d = await r.json();
    if(d.ok) return true;   // 密码正确或未启用
  }catch(e){}
  sessionStorage.removeItem("adminPass");
  return new Promise(resolve=>{
    const ov = document.createElement("div");
    ov.id = "adminGate";
    ov.style.cssText = "position:fixed;inset:0;background:rgba(20,30,48,.92);z-index:9999;display:flex;align-items:center;justify-content:center;";
    ov.innerHTML = '<div style="background:#FDFBF3;padding:34px 38px;max-width:360px;width:90%;border-top:4px solid var(--navy,#1F3A5F);">'
      +'<div style="font-weight:700;font-size:16px;">后台安全验证</div>'
      +'<div style="font-size:12px;color:#8B8578;margin:6px 0 14px;">此后台管理大纲、测算参数与知识库，请输入管理员密码。</div>'
      +'<input id="agPass" type="password" placeholder="管理员密码" style="width:100%;padding:9px 10px;font-size:14px;box-sizing:border-box;">'
      +'<div id="agErr" style="color:#B33;font-size:12px;min-height:16px;margin-top:6px;"></div>'
      +'<button id="agGo" class="btn" style="width:100%;margin-top:8px;">进入后台</button></div>';
    document.body.appendChild(ov);
    const doCheck = async ()=>{
      const p = document.getElementById("agPass").value;
      if(!p) return;
      const btn = document.getElementById("agGo");
      btn.disabled = true; btn.textContent = "验证中…";
      try{
        const r = await fetch("/api/adminpass",{method:"POST",headers:authHeaders(),body:JSON.stringify({pass:p})});
        const d = await r.json();
        if(d.ok){ sessionStorage.setItem("adminPass", p); ov.remove(); resolve(true); return; }
        document.getElementById("agErr").textContent = d.error || "验证失败";
      }catch(e){ document.getElementById("agErr").textContent = "网络错误"; }
      btn.disabled = false; btn.textContent = "进入后台";
    };
    document.getElementById("agGo").onclick = doCheck;
    document.getElementById("agPass").addEventListener("keydown", e=>{ if(e.key==="Enter") doCheck(); });
    setTimeout(()=>document.getElementById("agPass").focus(), 100);
  });
}

async function saveExamples(){
  readExForm();
  const btn = document.getElementById("saveEx");

/* ================= RAG知识库（全量报告向量入库） ================= */
function loadScript(src){ return new Promise((ok,err)=>{ const s=document.createElement("script"); s.src=src; s.onload=ok; s.onerror=()=>err(new Error("加载失败:"+src)); document.head.appendChild(s); }); }
async function ragParseFile(f){
  const ext = (f.name.split(".").pop()||"").toLowerCase();
  if(ext==="txt") return await f.text();
  if(ext==="docx"){
    if(!window.mammoth) await loadScript("mammoth.min.js");
    return (await window.mammoth.extractRawText({arrayBuffer: await f.arrayBuffer()})).value||"";
  }
  if(ext==="pdf"){
    if(!window.pdfjsLib) await loadScript("pdf.min.js");
    window.pdfjsLib.GlobalWorkerOptions.workerSrc = "pdf.worker.min.js";
    const pdf = await window.pdfjsLib.getDocument({data: await f.arrayBuffer()}).promise;
    const parts = [];
    for(let p=1; p<=pdf.numPages; p++){ const tc = await (await pdf.getPage(p)).getTextContent(); parts.push(tc.items.map(it=>it.str).join("")); }
    return parts.join("\n");
  }
  throw new Error("不支持 ."+ext);
}
function ragSplit(text, title){
  const lines = text.split(/\r?\n/);
  const chRe = /^第\s*([一二三四五六七八九十百]+)\s*[章篇]\s*[、．.:：\s]*(.*)$/;
  const secRe = /^(\d+\.\d+)\s*[、．.:：\s]*(.+)$/;
  const chunks = [];
  let ch="", sec="", buf=[];
  const flush = ()=>{
    const t = buf.join("\n").trim();
    buf = [];
    if(t.length < 120) return;   // 过短块不入库
    // 超长按2000字切
    for(let i=0;i<t.length;i+=2000) chunks.push({title, chapter:ch, section:sec, text:t.slice(i,i+2000)});
  };
  lines.forEach(raw=>{
    const line = raw.trim();
    let m;
    if((m=line.match(chRe)) && line.length<40){ flush(); ch=(m[2]||("第"+m[1]+"章")).trim(); sec=""; return; }
    if((m=line.match(secRe)) && line.length<45){ flush(); sec=m[2].trim(); return; }
    if(line) buf.push(line);
  });
  flush();
  return chunks;
}
async function openRag(){
  document.getElementById("listBox").style.display="none";
  const box = document.getElementById("editBox");
  box.style.display="block";
  box.innerHTML = '<h1 style="font-size:18px;">RAG知识库</h1>'
    +'<div class="sub">批量上传存量可研报告（docx/pdf/txt），按章节切块、向量化后存入语义检索库。生成报告时自动检索最相关的段落注入AI。<b>需先按部署说明创建 Vectorize 索引并绑定 VECTORIZE 与 AI。</b></div>'
    +'<div id="ragStats" style="font-size:12px; color:var(--soft); margin:8px 0;">读取库规模…</div>'
    +'<div style="display:flex; gap:12px; margin-bottom:10px; flex-wrap:wrap; align-items:center;">'
    +'<label style="font-size:13px;">分类：<select id="ragCat" style="padding:5px 8px;"><option>可研报告</option><option>政策文件</option><option>制度规范</option><option>业务逻辑</option><option>会议纪要</option><option>其他</option></select></label>'
    +'<label style="font-size:13px;">权威等级：<select id="ragLevel" style="padding:5px 8px;"><option value="1">权威（政策/正式文件）</option><option value="2" selected>参考（一般报告）</option><option value="3">存档（历史/非正式）</option></select></label>'
    +'<span style="font-size:11px; color:var(--soft);">上传的这批文件将统一归入所选分类与等级</span></div>'
    +'<div style="border:2px dashed var(--line); background:#fff; padding:26px; text-align:center;">'
    +'<button class="btn" id="ragPick">选择文件（可多选）</button>'
    +'<input type="file" id="ragFiles" accept=".docx,.pdf,.txt" multiple style="display:none;">'
    +'<div id="ragProg" style="font-size:12px; color:var(--soft); margin-top:12px;">未开始</div></div>'
    +'<div style="margin-top:18px; display:flex; justify-content:space-between; align-items:center;"><b style="font-weight:600;">已入库文件</b>'
    +'<label style="font-size:12px;">筛选分类：<select id="ragFilter" style="padding:4px 8px;"><option value="">全部</option><option>可研报告</option><option>政策文件</option><option>制度规范</option><option>业务逻辑</option><option>会议纪要</option><option>其他</option></select></label></div>'
    +'<div id="ragFileList" style="font-size:12.5px;"><span style="color:var(--soft);">读取中…</span></div>'
    +'<div style="margin-top:18px; font-weight:600;">检索测试</div>'
    +'<div style="display:flex; gap:8px; margin-top:6px;"><input id="ragQ" placeholder="如：市场分析 供需" style="flex:1;"><button class="btn sm" id="ragTest">检索</button></div>'
    +'<div id="ragHits" style="font-size:12.5px;"></div>'
    +'<div class="bar" style="margin-top:18px;"><button class="btn ghost" id="ragBack">返回列表</button></div>';
  document.getElementById("ragBack").onclick = ()=>loadList();
  document.getElementById("ragPick").onclick = ()=>document.getElementById("ragFiles").click();
  document.getElementById("ragFiles").onchange = e=>ragIngest([...e.target.files]);
  document.getElementById("ragTest").onclick = ragTest;
  document.getElementById("ragFilter").onchange = refreshRagFiles;
  refreshRagStats();
  refreshRagFiles();
}
async function refreshRagStats(){
  try{
    const r = await fetch("/api/rag",{method:"POST",headers:authHeaders(),body:JSON.stringify({action:"stats"})});
    const d = await r.json();
    document.getElementById("ragStats").textContent = d.ok? ("当前库内向量块数："+(d.count===null?"未知（索引可用）":d.count)) : ("状态："+(d.error||"不可用"));
  }catch(e){ document.getElementById("ragStats").textContent = "状态读取失败"; }
}
async function ragIngest(files){
  const prog = document.getElementById("ragProg");
  let totalChunks = 0, okChunks = 0, failed = [];
  for(let fi=0; fi<files.length; fi++){
    const f = files[fi];
    prog.textContent = "解析 "+(fi+1)+"/"+files.length+"：《"+f.name+"》…";
    let chunks;
    try{
      const text = await ragParseFile(f);
      chunks = ragSplit(text, f.name.replace(/\.[^.]+$/,""));
      if(!chunks.length){ failed.push(f.name+"（无有效块）"); continue; }
    }catch(e){ failed.push(f.name+"（"+e.message+"）"); continue; }
    totalChunks += chunks.length;
    for(let i=0; i<chunks.length; i+=10){
      prog.textContent = "《"+f.name+"》向量化入库 "+Math.min(i+10,chunks.length)+"/"+chunks.length+"（文件"+(fi+1)+"/"+files.length+"）";
      try{
        const cat = document.getElementById("ragCat")? document.getElementById("ragCat").value : "未分类";
        const lvl = document.getElementById("ragLevel")? document.getElementById("ragLevel").value : 2;
        const r = await fetch("/api/rag",{method:"POST",headers:authHeaders(),
          body:JSON.stringify({action:"upsert", chunks:chunks.slice(i,i+10), category:cat, level:lvl})});
        const d = await r.json();
        if(d.ok) okChunks += d.count; else{ failed.push(f.name+"批次"+i+"："+d.error); break; }
      }catch(e){ failed.push(f.name+"批次"+i+"：网络错误"); break; }
    }
  }
  prog.innerHTML = "完成：入库 "+okChunks+"/"+totalChunks+" 块" + (failed.length? '<br><span style="color:var(--red);">失败：'+esc(failed.slice(0,5).join("；"))+'</span>':'');
  refreshRagStats();
  refreshRagFiles();
}

async function refreshRagFiles(){
  const box = document.getElementById("ragFileList");
  try{
    const r = await fetch("/api/rag",{method:"POST",headers:authHeaders(),body:JSON.stringify({action:"list"})});
    const d = await r.json();
    if(!d.ok){ box.innerHTML = '<span style="color:var(--soft);">'+esc(d.error||"不可用")+'</span>'; return; }
    if(!(d.files||[]).length){ box.innerHTML = '<span style="color:var(--soft);">暂无（本功能上线前入库的内容不在台账中，如需清理请重建索引后重新上传）</span>'; return; }
    const flt = document.getElementById("ragFilter") ? document.getElementById("ragFilter").value : "";
    const LVN = {1:"权威",2:"参考",3:"存档"};
    const LVC = {1:"#1F7A3D",2:"#8A6D1B",3:"#888"};
    let files = d.files;
    if(flt) files = files.filter(f=>(f.category||"未分类")===flt);
    if(!files.length){ box.innerHTML = '<span style="color:var(--soft);">该分类下暂无文件</span>'; return; }
    box.innerHTML = files.map(f=>{
      const en = f.enabled!==0;
      const lvl = parseInt(f.level)||2;
      return '<div style="display:flex; align-items:center; gap:8px; border:1px solid var(--line); background:'+(en?"#fff":"#F5F5F5")+'; padding:8px 12px; margin-top:6px; '+(en?"":"opacity:.6;")+'">'
      +'<b style="flex:1;">'+esc(f.title)+(en?"":" （已停用）")+'</b>'
      +'<span style="font-size:11px; padding:1px 7px; border:1px solid var(--line); border-radius:2px; color:var(--soft);">'+esc(f.category||"未分类")+'</span>'
      +'<span style="font-size:11px; color:'+LVC[lvl]+';">'+LVN[lvl]+'</span>'
      +'<span style="color:var(--soft);">'+f.chunks+'块</span>'
      +'<button class="btn sm" data-ragtoggle="'+esc(f.title)+'" data-en="'+(en?1:0)+'">'+(en?"停用":"启用")+'</button>'
      +'<button class="btn sm red" data-ragdel="'+esc(f.title)+'">删除</button></div>';
    }).join("");
    box.querySelectorAll("[data-ragtoggle]").forEach(b=>{
      b.onclick = async ()=>{
        const t=b.dataset.ragtoggle, wantEnable = b.dataset.en==="0";
        b.disabled=true;
        try{
          const r=await fetch("/api/rag",{method:"POST",headers:authHeaders(),body:JSON.stringify({action:"toggle", title:t, enabled:wantEnable})});
          const d=await r.json();
          if(d.ok) msg(wantEnable?"已启用":"已停用（不再参与检索）","ok"); else msg(d.error||"操作失败","err");
        }catch(e){ msg("网络错误","err"); }
        refreshRagFiles();
      };
    });
    box.querySelectorAll("[data-ragdel]").forEach(b=>{
      b.onclick = async ()=>{
        const t = b.dataset.ragdel;
        if(!confirm('确定从知识库删除《'+t+'》的全部向量块？此操作不可恢复。')) return;
        b.disabled = true; b.textContent = "删除中…";
        try{
          const r = await fetch("/api/rag",{method:"POST",headers:authHeaders(),body:JSON.stringify({action:"deleteByTitle", title:t})});
          const d = await r.json();
          if(d.ok) msg("已删除 "+d.deleted+" 块","ok"); else msg(d.error||"删除失败","err");
        }catch(e){ msg("网络错误","err"); }
        refreshRagFiles(); refreshRagStats();
      };
    });
  }catch(e){ box.innerHTML = '<span style="color:var(--soft);">读取失败</span>'; }
}

async function ragTest(){
  const q = document.getElementById("ragQ").value.trim();
  if(!q) return;
  const box = document.getElementById("ragHits");
  box.textContent = "检索中…";
  try{
    const r = await fetch("/api/rag",{method:"POST",headers:authHeaders(),body:JSON.stringify({action:"query", query:q, topK:3})});
    const d = await r.json();
    if(!d.ok){ box.textContent = d.error; return; }

async function evolveRules(){
  const box = document.getElementById("evolveBox");
  box.innerHTML = '<div style="padding:14px 0; color:var(--soft); font-size:13px;">读取修改意见记录…</div>';
  try{
    const r = await fetch("/api/revlog",{headers:authHeaders()});
    const d = await r.json();
    if(!d.ok) throw new Error(d.error||"读取失败");
    const list = d.list||[];
    if(!list.length){ box.innerHTML = '<div style="padding:14px 0; color:var(--soft); font-size:13px;">暂无修改意见记录。用户在复核页使用"✎ AI修改"后会自动积累。</div>'; return; }
    box.innerHTML = '<div style="padding:14px 0; color:var(--soft); font-size:13px;">已读取 '+list.length+' 条意见，AI归纳中…</div>';
    const digest = list.slice(0,200).map(x=>'['+(x.chapter||"?")+'/'+(x.section||"?")+'] '+x.instruction).join("\n");
    const sys = '你是可研报告质量管理专家。以下是用户对AI生成章节提出的修改意见记录。请归纳出其中反复出现的共性问题，转化为可配置的审核规则建议。只输出JSON数组（不要代码块、不要其他文字），每项格式：{"match":"匹配章节关键词(如:市场分析,多个逗号分隔,通用则填*)","rule":"审核要点(50字内,写给AI评审用)","reason":"依据(出现了哪类意见约几次,30字内)"}。最多5条，按重要性排序。';
    const resp = await fetch("/api/generate",{method:"POST", headers:Object.assign({"Content-Type":"application/json"}, authHeaders()),
      body:JSON.stringify({system:sys, messages:[{role:"user", content:digest}]})});
    const gd = await resp.json();
    if(gd.error) throw new Error(gd.error);
    const text = (gd.content||[]).map(b=>b.text||"").join("").replace(/```json|```/g,"").trim();
    const arr = JSON.parse(text.slice(text.indexOf("["), text.lastIndexOf("]")+1));
    if(!arr.length){ box.innerHTML = '<div style="padding:14px 0; color:var(--soft);">AI未归纳出共性规则。</div>'; return; }
    box.innerHTML = '<div style="margin:14px 0 6px; font-weight:600; font-size:13px;">AI建议新增以下规则（逐条审阅，点采纳加入上方列表，最后记得保存）：</div>'
      + arr.map((a,i)=>'<div style="border:1px solid var(--line); background:#FFFDF5; padding:10px 12px; margin-top:8px; font-size:13px;">'
        +'<div><b>匹配：</b>'+esc(a.match||"*")+' ｜ <b>依据：</b><span style="color:var(--soft);">'+esc(a.reason||"")+'</span></div>'
        +'<div style="margin-top:4px;"><b>要点：</b>'+esc(a.rule||"")+'</div>'
        +'<button class="btn sm" data-adoptr="'+i+'" style="margin-top:8px;">采纳此规则</button></div>').join("");
    box.querySelectorAll("[data-adoptr]").forEach(b=>{
      b.onclick = ()=>{
        const a = arr[+b.dataset.adoptr];
        readArForm(); arList.push({match:a.match||"*", rule:a.rule||""});
        renderAiRules();
        msg("已加入列表，请点「保存规则」持久化","ok");
      };
    });
  }catch(e){ box.innerHTML = '<div style="padding:14px 0; color:var(--red); font-size:13px;">失败：'+esc(e.message)+'</div>'; }
}

function readCfgForm(){
  document.querySelectorAll("[data-type][data-k]").forEach(el=>{
    const t=el.dataset.type, k=el.dataset.k, v=el.value.trim();
    if(!calcCfg[t]) calcCfg[t]={};
    if(v==="") delete calcCfg[t][k];
    else calcCfg[t][k] = parseFloat(v);
  });
  const names=[...document.querySelectorAll(".m-name")], exprs=[...document.querySelectorAll(".m-expr")], scopes=[...document.querySelectorAll(".m-scope")];
  calcCfg.metrics = names.map((n,i)=>({name:n.value.trim(), expr:exprs[i].value.trim(), scope:scopes[i].value}))
    .filter(m=>m.name&&m.expr);
  const sn=[...document.querySelectorAll(".sc-name")], se=[...document.querySelectorAll(".sc-expr")],
    sd=[...document.querySelectorAll(".sc-dir")], sg=[...document.querySelectorAll(".sc-good")],
    sm2=[...document.querySelectorAll(".sc-mid")], sw=[...document.querySelectorAll(".sc-w")],
    ss=[...document.querySelectorAll(".sc-scope")];
  calcCfg.score = sn.map((n,i)=>({name:n.value.trim(), expr:se[i].value.trim(), dir:sd[i].value,
    goodV:sg[i].value.trim(), midV:sm2[i].value.trim(), weight:parseFloat(sw[i].value)||0, scope:ss[i].value}))
    .filter(m=>m.name&&m.expr&&m.goodV!=="");
}

    const d = await r.json();
    if(d.ok){ msg("已删除","ok"); loadList(); } else msg(d.error,"err");
  });
}

async function openEdit(key){
  if(key){
    const r = await fetch("/api/outlines?key="+encodeURIComponent(key),{headers:authHeaders()});
    const d = await r.json();
    if(!d.ok){ msg(d.error,"err"); return; }
    editing = {key:d.outline.key, label:d.outline.label, chapters:d.outline.chapters};
  }else{
    editing = {key:"", label:"", chapters:[{cn:"一", name:"项目总论", sections:[{t:"项目背景", numeric:false}]}]};
  }
  document.getElementById("listBox").style.display="none";
  document.getElementById("editBox").style.display="block";
  renderEdit();
}

function renderEdit(){
  const e = editing;
  let html = '<label>大纲Key（英文小写+数字，保存后不可改）</label><input id="eKey" value="'+esc(e.key)+'" '+(e.key?'disabled':'')+'>'
    +'<label>显示标签（如"保障房·非居改保"）</label><input id="eLabel" value="'+esc(e.label)+'">'
    +'<div style="display:flex;justify-content:space-between;align-items:center;margin-top:16px;"><b>章节结构</b><button class="btn sm" id="addCh">+ 添加章节</button></div>'
    +'<div class="ch-list" id="chList"></div>'
    +'<div class="bar" style="margin-top:18px;">'
    +'<button class="btn" id="saveBtn">保存大纲</button>'
    +'<button class="btn ghost" id="previewBtn">预览JSON</button>'
    +'<button class="btn ghost" id="cancelBtn">返回列表</button></div>'
    +'<div id="previewBox"></div>';
  document.getElementById("editBox").innerHTML = html;
  renderChapters();
  document.getElementById("addCh").onclick = ()=>{ e.chapters.push({cn:cnNum(e.chapters.length+1), name:"", sections:[{t:"",numeric:false}]}); renderChapters(); };
  document.getElementById("saveBtn").onclick = saveOutline;
  document.getElementById("previewBtn").onclick = ()=>{ readForm(); document.getElementById("previewBox").innerHTML='<div class="preview">'+esc(JSON.stringify(editing,null,2))+'</div>'; };
  document.getElementById("cancelBtn").onclick = ()=>loadList();
}

const CN = ["一","二","三","四","五","六","七","八","九","十","十一","十二","十三","十四","十五","十六","十七","十八","十九","二十"];
function cnNum(n){ return CN[n-1]||String(n); }

function renderChapters(){
  const box = document.getElementById("chList");
  box.innerHTML = editing.chapters.map((c,ci)=>{
    let secHtml = c.sections.map((s,si)=>
      '<div class="sec-row"><input value="'+esc(s.t)+'" data-ci="'+ci+'" data-si="'+si+'" class="sec-t" placeholder="子标题名称">'
      +'<select data-ci="'+ci+'" data-si="'+si+'" class="sec-num"><option value="0" '+(s.numeric?'':'selected')+'>文字</option><option value="1" '+(s.numeric?'selected':'')+'>数据</option></select>'
      +'<button class="btn sm red" data-ci="'+ci+'" data-si="'+si+'" title="删除子标题">×</button></div>'
    ).join("");
    return '<div class="ch-row"><div class="ch-head">'
      +'<span style="font-family:var(--serif);color:var(--bp);min-width:30px;">'+esc(c.cn)+'</span>'
      +'<input value="'+esc(c.name)+'" data-ci="'+ci+'" class="ch-name" placeholder="章节名称">'
      +'<button class="btn sm red" data-chd="'+ci+'" title="删除整章">删除章</button></div>'
      + secHtml
      +'<span class="add-link" data-addsec="'+ci+'">+ 添加子标题</span></div>';
  }).join("");
  // 绑事件
  box.querySelectorAll("[data-addsec]").forEach(b=>b.onclick=()=>{
    const ci=+b.dataset.addsec;
    editing.chapters[ci].sections.push({t:"",numeric:false});
    renderChapters();
  });
  box.querySelectorAll("[data-chd]").forEach(b=>b.onclick=()=>{
    editing.chapters.splice(+b.dataset.chd,1);
    editing.chapters.forEach((c,i)=>c.cn=cnNum(i+1));
    renderChapters();
  });
  box.querySelectorAll(".sec-row .btn").forEach(b=>b.onclick=()=>{
    editing.chapters[+b.dataset.ci].sections.splice(+b.dataset.si,1);
    renderChapters();
  });
}

function readForm(){
  editing.key = document.getElementById("eKey").value.trim();
  editing.label = document.getElementById("eLabel").value.trim();
  document.querySelectorAll(".ch-name").forEach(el=>{
    editing.chapters[+el.dataset.ci].name = el.value.trim();
  });
  document.querySelectorAll(".sec-t").forEach(el=>{
    editing.chapters[+el.dataset.ci].sections[+el.dataset.si].t = el.value.trim();
  });
  document.querySelectorAll(".sec-num").forEach(el=>{
    editing.chapters[+el.dataset.ci].sections[+el.dataset.si].numeric = el.value==="1";
  });
}

async function saveOutline(){
  readForm();
  if(!editing.key || !editing.label){ msg("Key和标签不能为空","err"); return; }
  const btn = document.getElementById("saveBtn");
  btn.disabled=true; btn.textContent="保存中…";
  try{
    const r = await fetch("/api/outlines",{method:"POST",headers:authHeaders(),
      body:JSON.stringify({key:editing.key, label:editing.label, chapters:editing.chapters})});
    const d = await r.json();
    if(d.ok){ msg("保存成功","ok"); loadList(); } else msg(d.error,"err");
  }catch(e){ msg("网络错误","err"); }
  btn.disabled=false; btn.textContent="保存大纲";
}

async function seedDefaults(){
  if(!confirm("将内置的2个默认大纲（非居改保、新建）导入数据库，已存在的同key大纲将被覆盖。继续？")) return;
  try{
    const resp = await fetch("outlines.js"); const text = await resp.text();
    const m = {}; new Function("window", text)({OUTLINES:null, set OUTLINES(v){Object.assign(m,v);}});
    // 实际上outlines.js用 window.OUTLINES = {...}，我们eval它
    const fn = new Function("var window={};"+text+";return window.OUTLINES;");
    const data = fn();
    for(const [k,v] of Object.entries(data)){
      await fetch("/api/outlines",{method:"POST",headers:authHeaders(),
        body:JSON.stringify({key:k, label:v.label, chapters:v.chapters})});
    }
    msg("导入完成","ok"); loadList();
  }catch(e){ msg("导入失败："+e.message,"err"); }
}

function esc(s){ return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

// 初始化
if(!getToken()){ document.getElementById("app").innerHTML='<div class="empty">请先在主站登录后再访问此页面（登录态通过浏览器共享）。</div>'; }
else{
  document.getElementById("loginInfo").textContent = "当前用户："+getUser();
  document.getElementById("btnNew").onclick = ()=>openEdit(null);
  document.getElementById("btnRefresh").onclick = loadList;
  document.getElementById("btnSeed").onclick = seedDefaults;
  document.getElementById("btnCalcCfg").onclick = openCalcCfg;
  document.getElementById("btnExamples").onclick = openExamples;
  document.getElementById("btnAiRules").onclick = openAiRules;
  document.getElementById("btnRag").onclick = openRag;
  (async ()=>{ if(await adminGate()) loadList(); })();
}
</script>
