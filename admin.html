<meta charset="utf-8">
<title>可研报告工坊 · 大纲管理</title>
<style>
  :root{--bp:#1E3A5C;--bg:#F2EFE7;--card:#FBFAF5;--ink:#1F262B;--soft:#66707A;--line:#D8D3C4;--red:#B7302B;--ok:#3E6B45;
    --mono:"SF Mono","Consolas",monospace;--sans:"PingFang SC","Microsoft YaHei",sans-serif;--serif:"Songti SC","SimSun",serif;}
  *{box-sizing:border-box;} body{margin:0;background:var(--bg);font-family:var(--sans);color:var(--ink);}
  .wrap{max-width:900px;margin:0 auto;padding:30px 24px;}
  h1{font-family:var(--serif);font-size:22px;color:var(--bp);margin:0 0 6px;}
  .sub{font-size:12px;color:var(--soft);margin-bottom:24px;}
  .bar{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap;}
  .btn{font-size:13px;font-weight:600;padding:9px 20px;border:1px solid var(--bp);border-radius:2px;background:var(--bp);color:#fff;cursor:pointer;}
  .btn:hover{filter:brightness(1.1);} .btn.ghost{background:transparent;color:var(--bp);} .btn.ghost:hover{background:var(--bp);color:#fff;}
  .btn:disabled{opacity:.4;cursor:not-allowed;}
  .btn.sm{padding:5px 12px;font-size:12px;}
  .btn.red{background:var(--red);border-color:var(--red);} .btn.red:hover{filter:brightness(1.1);}
  input,textarea,select{font-family:var(--sans);font-size:14px;padding:8px 10px;border:1px solid var(--line);background:#fff;width:100%;outline:none;}
  input:focus,textarea:focus{border-color:var(--bp);}
  label{display:block;font-size:12px;color:var(--soft);margin:12px 0 4px;}
  .card{background:var(--card);border:1px solid var(--line);padding:18px 22px;margin-bottom:12px;border-radius:2px;display:flex;justify-content:space-between;align-items:center;}
  .card .name{font-weight:600;font-size:15px;} .card .meta{font-size:11px;color:var(--soft);font-family:var(--mono);}
  .card .ops{display:flex;gap:8px;}
  .empty{text-align:center;color:var(--soft);padding:40px 0;}
  .ch-list{margin-top:10px;} .ch-row{border:1px solid var(--line);margin-bottom:8px;background:#fff;padding:12px 14px;border-radius:2px;}
  .ch-head{display:flex;gap:10px;align-items:center;margin-bottom:8px;}
  .ch-head input{flex:1;font-weight:600;}
  .sec-row{display:flex;gap:8px;align-items:center;margin:4px 0 4px 24px;}
  .sec-row input{flex:1;} .sec-row select{width:70px;flex-shrink:0;}
  .add-link{font-size:12px;color:var(--bp);cursor:pointer;margin-left:24px;margin-top:4px;display:inline-block;}
  .add-link:hover{text-decoration:underline;}
  .msg{padding:10px 14px;margin-bottom:14px;font-size:13px;border-radius:2px;}
  .msg.ok{background:#EAF1EA;color:var(--ok);border:1px solid var(--ok);}
  .msg.err{background:#FDF6F5;color:var(--red);border:1px solid var(--red);}
  .preview{background:#F5F3EA;border:1px solid var(--line);padding:14px 18px;margin-top:14px;font-size:13px;max-height:300px;overflow-y:auto;white-space:pre-wrap;font-family:var(--mono);color:var(--soft);}
</style>
<div class="wrap">
  <h1>可研报告工坊 · 大纲管理后台</h1>
  <div class="sub">管理员可在此新建/编辑/删除报告领域大纲。修改后立即生效，所有用户下次选领域时将看到最新版本。</div>
  <div id="msgBox"></div>
  <div id="app">
    <div class="bar">
      <button class="btn" id="btnNew">+ 新建领域大纲</button>
      <button class="btn ghost" id="btnRefresh">刷新列表</button>
      <button class="btn ghost" id="btnSeed">导入内置默认大纲</button>
      <button class="btn ghost" id="btnCalcCfg">测算参数管理</button>
      <button class="btn ghost" id="btnExamples">黄金范例库</button>
      <button class="btn ghost" id="btnAiRules">AI审核规则</button>
      <span style="margin-left:auto;font-size:12px;color:var(--soft);" id="loginInfo"></span>
    </div>
    <div id="listBox"></div>
    <div id="editBox" style="display:none;"></div>
  </div>
</div>
<script>
function getToken(){ return localStorage.getItem("fs_token"); }
function getUser(){ return localStorage.getItem("fs_user"); }
function authHeaders(){ const t=getToken(); return t? {"Authorization":"Bearer "+t,"Content-Type":"application/json"}:{"Content-Type":"application/json"}; }
function msg(text,type){ document.getElementById("msgBox").innerHTML='<div class="msg '+type+'">'+text+'</div>'; setTimeout(()=>{document.getElementById("msgBox").innerHTML="";},4000); }

let allOutlines = [];
let editing = null; // {key, label, chapters}



/* ================= 黄金范例库 ================= */
let exList = [];
async function openExamples(){
  document.getElementById("listBox").style.display="none";
  const box = document.getElementById("editBox");
  box.style.display="block";
  box.innerHTML = '<div style="padding:30px 0; color:var(--soft);">加载范例库…</div>';
  try{
    const r = await fetch("/api/calcconfig",{headers:authHeaders()});
    const d = await r.json();
    exList = (d.ok && d.config && d.config.examples)? d.config.examples : [];
  }catch(e){ exList = []; }
  renderExamples();
}
function renderExamples(){
  const box = document.getElementById("editBox");
  box.innerHTML = '<h1 style="font-size:18px;">黄金范例库</h1>'
    +'<div class="sub">为章节配置优秀范文。生成时按<b>匹配关键词</b>命中章节标题即注入（最多2篇/节，每篇截取前1800字），并要求AI学习结构与深度、不得照抄数据。关键词可填多个（逗号分隔），如"市场分析,供需"。</div>'
    +'<div id="exList">'+exList.map((e,i)=>exRowHtml(e,i)).join("")+'</div>'
    +'<span class="add-link" id="addEx" style="margin-left:0;">+ 添加范例</span>'
    +'<div class="bar" style="margin-top:18px;"><button class="btn" id="saveEx">保存范例库</button>'
    +'<button class="btn ghost" id="exBack">返回列表</button></div>';
  document.getElementById("addEx").onclick = ()=>{ readExForm(); exList.push({match:"",title:"",content:""}); renderExamples(); };
  document.getElementById("saveEx").onclick = saveExamples;
  document.getElementById("exBack").onclick = ()=>loadList();
  document.querySelectorAll("[data-exdel]").forEach(b=>b.onclick=()=>{ readExForm(); exList.splice(+b.dataset.exdel,1); renderExamples(); });
}
function exRowHtml(e,i){
  return '<div style="border:1px solid var(--line); background:#fff; padding:10px 12px; margin-top:10px;">'
    +'<div style="display:flex; gap:8px; align-items:center;">'
    +'<input class="ex-match" placeholder="匹配关键词（如：市场分析,供需）" value="'+esc(e.match||"")+'" style="width:220px;">'
    +'<input class="ex-title" placeholder="范文标题（如：XX项目-市场分析章）" value="'+esc(e.title||"")+'" style="flex:1;">'
    +'<button class="btn sm red" data-exdel="'+i+'">删除</button></div>'
    +'<textarea class="ex-content" placeholder="粘贴范文正文…" style="margin-top:8px; min-height:90px;">'+esc(e.content||"")+'</textarea></div>';
}
function readExForm(){
  const ms=[...document.querySelectorAll(".ex-match")], ts=[...document.querySelectorAll(".ex-title")], cs=[...document.querySelectorAll(".ex-content")];
  exList = ms.map((m,i)=>({match:m.value.trim(), title:ts[i].value.trim(), content:cs[i].value}))
    .filter(e=>e.match && e.content.trim());
}
async function saveExamples(){
  readExForm();
  const btn = document.getElementById("saveEx");
  btn.disabled=true; btn.textContent="保存中…";
  try{
    const r = await fetch("/api/calcconfig",{method:"POST",headers:authHeaders(),
      body:JSON.stringify({key:"examples", data:exList})});
    const d = await r.json();
    if(d.ok) msg("范例库已保存，生成时自动匹配注入","ok"); else msg(d.error||"保存失败","err");
  }catch(e){ msg("网络错误","err"); }
  btn.disabled=false; btn.textContent="保存范例库";
}


/* ================= AI审核规则 ================= */
let arList = [];
async function openAiRules(){
  document.getElementById("listBox").style.display="none";
  const box = document.getElementById("editBox");
  box.style.display="block";
  box.innerHTML = '<div style="padding:30px 0; color:var(--soft);">加载规则…</div>';
  try{
    const r = await fetch("/api/calcconfig",{headers:authHeaders()});
    const d = await r.json();
    arList = (d.ok && d.config && d.config.airules)? d.config.airules : [];
  }catch(e){ arList = []; }
  renderAiRules();
}
function renderAiRules(){
  const box = document.getElementById("editBox");
  box.innerHTML = '<h1 style="font-size:18px;">AI审核规则</h1>'
    +'<div class="sub">复核页"AI深度审核"按这些要点逐节评审。<b>匹配关键词</b>命中章节标题即适用（多个用逗号分隔；填 <b>*</b> 表示适用所有小节）。要点写给AI看，例如："必须引用具体政策文件名；须包含供需两侧数据；每项风险须有对应对策"。未配置任何规则时使用内置通用规则。</div>'
    +'<div id="arList">'+arList.map((e,i)=>arRowHtml(e,i)).join("")+'</div>'
    +'<span class="add-link" id="addAr" style="margin-left:0;">+ 添加规则</span>'
    +'<span class="add-link" id="evolveAr" style="margin-left:18px; color:var(--red);">⟳ 从修改意见生成规则建议</span>'
    +'<div id="evolveBox"></div>'
    +'<div class="bar" style="margin-top:18px;"><button class="btn" id="saveAr">保存规则</button>'
    +'<button class="btn ghost" id="arBack">返回列表</button></div>';
  document.getElementById("addAr").onclick = ()=>{ readArForm(); arList.push({match:"",rule:""}); renderAiRules(); };
  document.getElementById("saveAr").onclick = saveAiRules;
  document.getElementById("arBack").onclick = ()=>loadList();
  document.querySelectorAll("[data-ardel]").forEach(b=>b.onclick=()=>{ readArForm(); arList.splice(+b.dataset.ardel,1); renderAiRules(); });
  document.getElementById("evolveAr").onclick = evolveRules;
}

async function evolveRules(){
  const box = document.getElementById("evolveBox");
  box.innerHTML = '<div style="padding:14px 0; color:var(--soft); font-size:13px;">读取修改意见记录…</div>';
  try{
    const r = await fetch("/api/revlog",{headers:authHeaders()});
    const d = await r.json();
    if(!d.ok) throw new Error(d.error||"读取失败");
    const list = d.list||[];
    if(!list.length){ box.innerHTML = '<div style="padding:14px 0; color:var(--soft); font-size:13px;">暂无修改意见记录。用户在复核页使用"✎ AI修改"后会自动积累。</div>'; return; }
    box.innerHTML = '<div style="padding:14px 0; color:var(--soft); font-size:13px;">已读取 '+list.length+' 条意见，AI归纳中…</div>';
    const digest = list.slice(0,200).map(x=>'['+(x.chapter||"?")+'/'+(x.section||"?")+'] '+x.instruction).join("\n");
    const sys = '你是可研报告质量管理专家。以下是用户对AI生成章节提出的修改意见记录。请归纳出其中反复出现的共性问题，转化为可配置的审核规则建议。只输出JSON数组（不要代码块、不要其他文字），每项格式：{"match":"匹配章节关键词(如:市场分析,多个逗号分隔,通用则填*)","rule":"审核要点(50字内,写给AI评审用)","reason":"依据(出现了哪类意见约几次,30字内)"}。最多5条，按重要性排序。';
    const resp = await fetch("/api/generate",{method:"POST", headers:Object.assign({"Content-Type":"application/json"}, authHeaders()),
      body:JSON.stringify({system:sys, messages:[{role:"user", content:digest}]})});
    const gd = await resp.json();
    if(gd.error) throw new Error(gd.error);
    const text = (gd.content||[]).map(b=>b.text||"").join("").replace(/```json|```/g,"").trim();
    const arr = JSON.parse(text.slice(text.indexOf("["), text.lastIndexOf("]")+1));
    if(!arr.length){ box.innerHTML = '<div style="padding:14px 0; color:var(--soft);">AI未归纳出共性规则。</div>'; return; }
    box.innerHTML = '<div style="margin:14px 0 6px; font-weight:600; font-size:13px;">AI建议新增以下规则（逐条审阅，点采纳加入上方列表，最后记得保存）：</div>'
      + arr.map((a,i)=>'<div style="border:1px solid var(--line); background:#FFFDF5; padding:10px 12px; margin-top:8px; font-size:13px;">'
        +'<div><b>匹配：</b>'+esc(a.match||"*")+' ｜ <b>依据：</b><span style="color:var(--soft);">'+esc(a.reason||"")+'</span></div>'
        +'<div style="margin-top:4px;"><b>要点：</b>'+esc(a.rule||"")+'</div>'
        +'<button class="btn sm" data-adoptr="'+i+'" style="margin-top:8px;">采纳此规则</button></div>').join("");
    box.querySelectorAll("[data-adoptr]").forEach(b=>{
      b.onclick = ()=>{
        const a = arr[+b.dataset.adoptr];
        readArForm(); arList.push({match:a.match||"*", rule:a.rule||""});
        renderAiRules();
        msg("已加入列表，请点「保存规则」持久化","ok");
      };
    });
  }catch(e){ box.innerHTML = '<div style="padding:14px 0; color:var(--red); font-size:13px;">失败：'+esc(e.message)+'</div>'; }
}

function arRowHtml(e,i){
  return '<div style="border:1px solid var(--line); background:#fff; padding:10px 12px; margin-top:10px;">'
    +'<div style="display:flex; gap:8px; align-items:center;">'
    +'<input class="ar-match" placeholder="匹配关键词（如：市场分析,供需 或 *）" value="'+esc(e.match||"")+'" style="width:260px;">'
    +'<button class="btn sm red" data-ardel="'+i+'" style="margin-left:auto;">删除</button></div>'
    +'<textarea class="ar-rule" placeholder="审核要点（写给AI）…" style="margin-top:8px; min-height:60px;">'+esc(e.rule||"")+'</textarea></div>';
}
function readArForm(){
  const ms=[...document.querySelectorAll(".ar-match")], rs=[...document.querySelectorAll(".ar-rule")];
  arList = ms.map((m,i)=>({match:m.value.trim(), rule:rs[i].value.trim()})).filter(e=>e.match&&e.rule);
}
async function saveAiRules(){
  readArForm();
  const btn = document.getElementById("saveAr");
  btn.disabled=true; btn.textContent="保存中…";
  try{
    const r = await fetch("/api/calcconfig",{method:"POST",headers:authHeaders(),
      body:JSON.stringify({key:"airules", data:arList})});
    const d = await r.json();
    if(d.ok) msg("AI审核规则已保存","ok"); else msg(d.error||"保存失败","err");
  }catch(e){ msg("网络错误","err"); }
  btn.disabled=false; btn.textContent="保存规则";
}

/* ================= 测算参数管理 ================= */
const PARAM_DEFS = {
  gaibao: {label:"非居改保类", params:[
    ["vatOut","租金/收楼/工程增值税率",0.09],["vatOps","运营/财务进项税率",0.06],
    ["surcharge","增值税附加率",0.12],["incomeTax","企业所得税率",0.25],
    ["stampDeco","装修合同印花税率",0.0003],["lossCarry","亏损弥补年限(年)",5],
  ]},
  rent: {label:"出租类", params:[
    ["mgHouseUnit","管理费(住房)元/㎡/月系数",1.92],["mgParkRatio","管理费(车位)占车位收入比",0.4],
    ["insPerSqm","保险费 元/㎡(总建面/年)",0.3],["repairRate","维修费率(占住宅租金)",0.02],
    ["fundPerSqm","维修基金 元/㎡/月",0.25],["vacPerSqm","空置物业费 元/㎡/月",3.9],
    ["resetRatio","装修重置比率",0.7],["resetPublic","公租房重置周期(年)",20],
    ["resetAffordable","保租房重置周期(年)",10],["resetSpread","重置费分摊年数",10],
    ["depResidual","折旧残值率",0.2],["depYears","折旧年限(年)",50],
    ["vatResi","住宅租金增值税率",0.015],["vatResiBase","住宅价税分离基数",0.05],
    ["vatPark","车位增值税率",0.09],["stampRate","印花税率",0.0005],
    ["citySur","城建附加率",0.07],["eduSur","教育附加率",0.05],
    ["propResi","房产税-住宅从租",0.04],["propPark","房产税-车位从租",0.12],
    ["propBase","房产税从价基数比",0.7],["propRate","房产税从价税率",0.012],
    ["propFreeYears","房产税免征年数",3],["landTaxPerSqm","土地使用税 元/㎡",3],
    ["incomeTax","所得税率",0.25],["lossCarry","亏损弥补年限(年)",5],
  ]},
  sale: {label:"出售类", params:[
    ["saleFeeRate","销售费用率",0.015],["vatSale","销售/商业增值税率",0.09],
    ["vatIn6","进项税6%档",0.06],["surcharge","增值税附加率",0.12],
    ["mgCommRate","商业管理费率",0.08],["parkMgUnit","停车管理费 元/位/月",80],
    ["fundPerSqm","维修金 元/㎡/月",0.25],["repairRate","维修费率",0.02],
    ["vacPerSqm","空置服务费 元/㎡/月",8],["insPerSqm","保险 元/㎡(年)",1.86],
    ["landTaxPerSqm","土地使用税 元/㎡",3],["prop1Rate","房产税1(从租)",0.12],
    ["prop2Base","房产税2从价基数",0.7],["prop2Rate","房产税2税率",0.012],
    ["extraEngRate","房产税2建安附加率",0.02],["rentalPvRate","出租净收益折现率",0.035],
    ["devDepRatio","折旧摊销基数比率",0.8],["depYears","摊销年限(年)",50],
    ["recoverRatio","回收固定资产余值比率",0.2],["adjTaxRate","调整所得税率",0.25],
    ["incomeTax","所得税率",0.25],["lossCarry","亏损弥补年限(年)",5],
    ["stampSaleRate","销售印花税率",0],
  ]},
};
const METRIC_VARS = "totalIncome(总收入) totalCost(总成本) totalTax(税金) totalNetProfit(净利润) totalNpv(净现值) irr(IRR) icr(利息保障倍数) totalSaleIncome(销售收入合计) rentalPvTotal(出租净收益现值) totalInterest(利息合计)";
let calcCfg = {gaibao:{}, rent:{}, sale:{}, metrics:[], score:[]};

async function openCalcCfg(){
  document.getElementById("listBox").style.display="none";
  const box = document.getElementById("editBox");
  box.style.display="block";
  box.innerHTML = '<div style="padding:30px 0; color:var(--soft);">加载配置中…</div>';
  try{
    const r = await fetch("/api/calcconfig",{headers:authHeaders()});
    const d = await r.json();
    if(d.ok) calcCfg = Object.assign({gaibao:{},rent:{},sale:{},metrics:[],score:[]}, d.config);
  }catch(e){}
  renderCalcCfg();
}
function renderCalcCfg(){
  const box = document.getElementById("editBox");
  let html = '<h1 style="font-size:18px;">测算参数管理</h1>'
    +'<div class="sub">修改后所有用户下次执行测算时生效。留空或恢复默认值即使用引擎内置口径。<b>改动会直接影响测算结果与"逐位一致"承诺，请确保有政策/口径依据后再改。</b></div>';
  for(const [type,def] of Object.entries(PARAM_DEFS)){
    html += '<div style="margin-top:18px; font-weight:600;">'+def.label+'</div>'
      +'<div style="display:grid; grid-template-columns:repeat(auto-fill,minmax(230px,1fr)); gap:8px 14px; margin-top:8px;">'
      + def.params.map(([k,label,dv])=>{
          const cur = (calcCfg[type]&&calcCfg[type][k]!==undefined)? calcCfg[type][k] : "";
          const changed = cur!=="" && parseFloat(cur)!==dv;
          return '<div><label style="margin:4px 0 2px;'+(changed?'color:var(--red);font-weight:600;':'')+'">'+label+'<span style="color:#999;">（默认'+dv+'）</span></label>'
            +'<input type="number" step="any" data-type="'+type+'" data-k="'+k+'" placeholder="'+dv+'" value="'+cur+'"></div>';
        }).join("")
      +'</div>';
  }
  // 自定义指标
  html += '<div style="margin-top:22px; font-weight:600;">自定义结果指标</div>'
    +'<div class="sub">公式可用变量：'+METRIC_VARS+'，支持 + - * / ( ) 与数字。示例：净利率(%) = totalNetProfit / totalIncome * 100</div>'
    +'<div id="metricList">'
    + (calcCfg.metrics||[]).map((m,i)=>metricRowHtml(m,i)).join("")
    +'</div>'
    +'<span class="add-link" id="addMetric" style="margin-left:0;">+ 添加自定义指标</span>'
    +'<div style="margin-top:22px; font-weight:600;">测算评分规则</div>'
    +'<div class="sub">留空则使用内置默认规则（IRR/NPV/利息保障/回正年限/净利率）。表达式变量同上（另有 paybackYears=回正年限）；方向"≥"越大越好、"≤"越小越好；良阈值可留空（不达优即差）。档位得分固定：优100/良60/差20，总分按权重加权。</div>'
    +'<div id="scoreList">'
    + (calcCfg.score||[]).map((m,i)=>scoreRowHtml(m,i)).join("")
    +'</div>'
    +'<span class="add-link" id="addScore" style="margin-left:0;">+ 添加评分规则</span>'
    +'<div class="bar" style="margin-top:18px;">'
    +'<button class="btn" id="saveCalcCfg">保存全部配置</button>'
    +'<button class="btn ghost" id="cfgBack">返回列表</button></div>';
  box.innerHTML = html;
  document.getElementById("saveCalcCfg").onclick = saveCalcCfg;
  document.getElementById("cfgBack").onclick = ()=>loadList();
  document.getElementById("addMetric").onclick = ()=>{
    readCfgForm(); calcCfg.metrics.push({name:"",expr:"",scope:"all"}); renderCalcCfg();
  };
  document.querySelectorAll("[data-mdel]").forEach(b=>b.onclick=()=>{
    readCfgForm(); calcCfg.metrics.splice(+b.dataset.mdel,1); renderCalcCfg();
  });
  document.getElementById("addScore").onclick = ()=>{
    readCfgForm(); calcCfg.score.push({name:"",expr:"",dir:">=",goodV:"",midV:"",weight:10,scope:"all"}); renderCalcCfg();
  };
  document.querySelectorAll("[data-sdel]").forEach(b=>b.onclick=()=>{
    readCfgForm(); calcCfg.score.splice(+b.dataset.sdel,1); renderCalcCfg();
  });
}

function scoreRowHtml(m,i){
  const sel = (k,s)=> m[k]===s?'selected':'';
  return '<div style="display:flex; gap:6px; margin:6px 0; align-items:center; flex-wrap:wrap;">'
    +'<input class="sc-name" data-i="'+i+'" placeholder="指标名称" value="'+esc(m.name||"")+'" style="width:150px;">'
    +'<input class="sc-expr" data-i="'+i+'" placeholder="表达式，如 irr" value="'+esc(m.expr||"")+'" style="flex:1; min-width:140px;">'
    +'<select class="sc-dir" data-i="'+i+'" style="width:64px;"><option value=">=" '+sel("dir",">=")+'>≥</option><option value="<=" '+sel("dir","<=")+'>≤</option></select>'
    +'<input class="sc-good" data-i="'+i+'" type="number" step="any" placeholder="优阈值" value="'+(m.goodV!==undefined&&m.goodV!==null?m.goodV:"")+'" style="width:80px;">'
    +'<input class="sc-mid" data-i="'+i+'" type="number" step="any" placeholder="良阈值" value="'+(m.midV!==undefined&&m.midV!==null?m.midV:"")+'" style="width:80px;">'
    +'<input class="sc-w" data-i="'+i+'" type="number" step="any" placeholder="权重" value="'+(m.weight!==undefined?m.weight:"")+'" style="width:70px;">'
    +'<select class="sc-scope" data-i="'+i+'" style="width:100px;"><option value="all" '+sel("scope","all")+'>全部类型</option><option value="gaibao" '+sel("scope","gaibao")+'>非居改保</option><option value="rent" '+sel("scope","rent")+'>出租类</option><option value="sale" '+sel("scope","sale")+'>出售类</option></select>'
    +'<button class="btn sm red" data-sdel="'+i+'">×</button></div>';
}

function metricRowHtml(m,i){
  const sel = s=> m.scope===s?'selected':'';
  return '<div style="display:flex; gap:8px; margin:6px 0; align-items:center;">'
    +'<input class="m-name" data-i="'+i+'" placeholder="指标名称" value="'+esc(m.name||"")+'" style="width:160px;">'
    +'<input class="m-expr" data-i="'+i+'" placeholder="公式，如 totalNetProfit/totalIncome*100" value="'+esc(m.expr||"")+'" style="flex:1;">'
    +'<select class="m-scope" data-i="'+i+'" style="width:110px;"><option value="all" '+sel("all")+'>全部类型</option><option value="gaibao" '+sel("gaibao")+'>非居改保</option><option value="rent" '+sel("rent")+'>出租类</option><option value="sale" '+sel("sale")+'>出售类</option></select>'
    +'<button class="btn sm red" data-mdel="'+i+'">×</button></div>';
}
function readCfgForm(){
  document.querySelectorAll("[data-type][data-k]").forEach(el=>{
    const t=el.dataset.type, k=el.dataset.k, v=el.value.trim();
    if(!calcCfg[t]) calcCfg[t]={};
    if(v==="") delete calcCfg[t][k];
    else calcCfg[t][k] = parseFloat(v);
  });
  const names=[...document.querySelectorAll(".m-name")], exprs=[...document.querySelectorAll(".m-expr")], scopes=[...document.querySelectorAll(".m-scope")];
  calcCfg.metrics = names.map((n,i)=>({name:n.value.trim(), expr:exprs[i].value.trim(), scope:scopes[i].value}))
    .filter(m=>m.name&&m.expr);
  const sn=[...document.querySelectorAll(".sc-name")], se=[...document.querySelectorAll(".sc-expr")],
    sd=[...document.querySelectorAll(".sc-dir")], sg=[...document.querySelectorAll(".sc-good")],
    sm2=[...document.querySelectorAll(".sc-mid")], sw=[...document.querySelectorAll(".sc-w")],
    ss=[...document.querySelectorAll(".sc-scope")];
  calcCfg.score = sn.map((n,i)=>({name:n.value.trim(), expr:se[i].value.trim(), dir:sd[i].value,
    goodV:sg[i].value.trim(), midV:sm2[i].value.trim(), weight:parseFloat(sw[i].value)||0, scope:ss[i].value}))
    .filter(m=>m.name&&m.expr&&m.goodV!=="");
}
async function saveCalcCfg(){
  readCfgForm();
  const btn = document.getElementById("saveCalcCfg");
  btn.disabled=true; btn.textContent="保存中…";
  try{
    for(const key of ["gaibao","rent","sale","metrics","score"]){
      const r = await fetch("/api/calcconfig",{method:"POST",headers:authHeaders(),
        body:JSON.stringify({key, data:calcCfg[key]})});
      const d = await r.json();
      if(!d.ok){ msg(d.error||"保存失败","err"); btn.disabled=false; btn.textContent="保存全部配置"; return; }
    }
    msg("配置已保存，所有用户下次测算生效","ok");
  }catch(e){ msg("网络错误","err"); }
  btn.disabled=false; btn.textContent="保存全部配置";
}

async function loadList(){
  document.getElementById("editBox").style.display="none";
  document.getElementById("listBox").style.display="block";
  try{
    const r = await fetch("/api/outlines",{headers:authHeaders()}); const d = await r.json();
    if(!d.ok){ msg(d.error||"加载失败","err"); return; }
    allOutlines = d.list||[];
    renderList();
  }catch(e){ msg("网络错误","err"); }
}

function renderList(){
  const box = document.getElementById("listBox");
  if(!allOutlines.length){ box.innerHTML='<div class="empty">暂无大纲。点击"新建领域大纲"或"导入内置默认大纲"开始。</div>'; return; }
  box.innerHTML = allOutlines.map(o=>{
    const t = new Date(o.updated_at);
    const when = t.toLocaleDateString("zh-CN")+" "+String(t.getHours()).padStart(2,"0")+":"+String(t.getMinutes()).padStart(2,"0");
    return '<div class="card"><div><div class="name">'+esc(o.label)+'</div><div class="meta">key: '+esc(o.key)+' ｜ '+when+'</div></div>'
      +'<div class="ops"><button class="btn sm" data-edit="'+esc(o.key)+'">编辑</button><button class="btn sm red" data-del="'+esc(o.key)+'">删除</button></div></div>';
  }).join("");
  box.querySelectorAll("[data-edit]").forEach(b=>b.onclick=()=>openEdit(b.dataset.edit));
  box.querySelectorAll("[data-del]").forEach(b=>b.onclick=async()=>{
    if(!confirm("确定删除大纲「"+b.dataset.del+"」？")) return;
    const r = await fetch("/api/outlines?key="+encodeURIComponent(b.dataset.del),{method:"DELETE",headers:authHeaders()});
    const d = await r.json();
    if(d.ok){ msg("已删除","ok"); loadList(); } else msg(d.error,"err");
  });
}

async function openEdit(key){
  if(key){
    const r = await fetch("/api/outlines?key="+encodeURIComponent(key),{headers:authHeaders()});
    const d = await r.json();
    if(!d.ok){ msg(d.error,"err"); return; }
    editing = {key:d.outline.key, label:d.outline.label, chapters:d.outline.chapters};
  }else{
    editing = {key:"", label:"", chapters:[{cn:"一", name:"项目总论", sections:[{t:"项目背景", numeric:false}]}]};
  }
  document.getElementById("listBox").style.display="none";
  document.getElementById("editBox").style.display="block";
  renderEdit();
}

function renderEdit(){
  const e = editing;
  let html = '<label>大纲Key（英文小写+数字，保存后不可改）</label><input id="eKey" value="'+esc(e.key)+'" '+(e.key?'disabled':'')+'>'
    +'<label>显示标签（如"保障房·非居改保"）</label><input id="eLabel" value="'+esc(e.label)+'">'
    +'<div style="display:flex;justify-content:space-between;align-items:center;margin-top:16px;"><b>章节结构</b><button class="btn sm" id="addCh">+ 添加章节</button></div>'
    +'<div class="ch-list" id="chList"></div>'
    +'<div class="bar" style="margin-top:18px;">'
    +'<button class="btn" id="saveBtn">保存大纲</button>'
    +'<button class="btn ghost" id="previewBtn">预览JSON</button>'
    +'<button class="btn ghost" id="cancelBtn">返回列表</button></div>'
    +'<div id="previewBox"></div>';
  document.getElementById("editBox").innerHTML = html;
  renderChapters();
  document.getElementById("addCh").onclick = ()=>{ e.chapters.push({cn:cnNum(e.chapters.length+1), name:"", sections:[{t:"",numeric:false}]}); renderChapters(); };
  document.getElementById("saveBtn").onclick = saveOutline;
  document.getElementById("previewBtn").onclick = ()=>{ readForm(); document.getElementById("previewBox").innerHTML='<div class="preview">'+esc(JSON.stringify(editing,null,2))+'</div>'; };
  document.getElementById("cancelBtn").onclick = ()=>loadList();
}

const CN = ["一","二","三","四","五","六","七","八","九","十","十一","十二","十三","十四","十五","十六","十七","十八","十九","二十"];
function cnNum(n){ return CN[n-1]||String(n); }

function renderChapters(){
  const box = document.getElementById("chList");
  box.innerHTML = editing.chapters.map((c,ci)=>{
    let secHtml = c.sections.map((s,si)=>
      '<div class="sec-row"><input value="'+esc(s.t)+'" data-ci="'+ci+'" data-si="'+si+'" class="sec-t" placeholder="子标题名称">'
      +'<select data-ci="'+ci+'" data-si="'+si+'" class="sec-num"><option value="0" '+(s.numeric?'':'selected')+'>文字</option><option value="1" '+(s.numeric?'selected':'')+'>数据</option></select>'
      +'<button class="btn sm red" data-ci="'+ci+'" data-si="'+si+'" title="删除子标题">×</button></div>'
    ).join("");
    return '<div class="ch-row"><div class="ch-head">'
      +'<span style="font-family:var(--serif);color:var(--bp);min-width:30px;">'+esc(c.cn)+'</span>'
      +'<input value="'+esc(c.name)+'" data-ci="'+ci+'" class="ch-name" placeholder="章节名称">'
      +'<button class="btn sm red" data-chd="'+ci+'" title="删除整章">删除章</button></div>'
      + secHtml
      +'<span class="add-link" data-addsec="'+ci+'">+ 添加子标题</span></div>';
  }).join("");
  // 绑事件
  box.querySelectorAll("[data-addsec]").forEach(b=>b.onclick=()=>{
    const ci=+b.dataset.addsec;
    editing.chapters[ci].sections.push({t:"",numeric:false});
    renderChapters();
  });
  box.querySelectorAll("[data-chd]").forEach(b=>b.onclick=()=>{
    editing.chapters.splice(+b.dataset.chd,1);
    editing.chapters.forEach((c,i)=>c.cn=cnNum(i+1));
    renderChapters();
  });
  box.querySelectorAll(".sec-row .btn").forEach(b=>b.onclick=()=>{
    editing.chapters[+b.dataset.ci].sections.splice(+b.dataset.si,1);
    renderChapters();
  });
}

function readForm(){
  editing.key = document.getElementById("eKey").value.trim();
  editing.label = document.getElementById("eLabel").value.trim();
  document.querySelectorAll(".ch-name").forEach(el=>{
    editing.chapters[+el.dataset.ci].name = el.value.trim();
  });
  document.querySelectorAll(".sec-t").forEach(el=>{
    editing.chapters[+el.dataset.ci].sections[+el.dataset.si].t = el.value.trim();
  });
  document.querySelectorAll(".sec-num").forEach(el=>{
    editing.chapters[+el.dataset.ci].sections[+el.dataset.si].numeric = el.value==="1";
  });
}

async function saveOutline(){
  readForm();
  if(!editing.key || !editing.label){ msg("Key和标签不能为空","err"); return; }
  const btn = document.getElementById("saveBtn");
  btn.disabled=true; btn.textContent="保存中…";
  try{
    const r = await fetch("/api/outlines",{method:"POST",headers:authHeaders(),
      body:JSON.stringify({key:editing.key, label:editing.label, chapters:editing.chapters})});
    const d = await r.json();
    if(d.ok){ msg("保存成功","ok"); loadList(); } else msg(d.error,"err");
  }catch(e){ msg("网络错误","err"); }
  btn.disabled=false; btn.textContent="保存大纲";
}

async function seedDefaults(){
  if(!confirm("将内置的2个默认大纲（非居改保、新建）导入数据库，已存在的同key大纲将被覆盖。继续？")) return;
  try{
    const resp = await fetch("outlines.js"); const text = await resp.text();
    const m = {}; new Function("window", text)({OUTLINES:null, set OUTLINES(v){Object.assign(m,v);}});
    // 实际上outlines.js用 window.OUTLINES = {...}，我们eval它
    const fn = new Function("var window={};"+text+";return window.OUTLINES;");
    const data = fn();
    for(const [k,v] of Object.entries(data)){
      await fetch("/api/outlines",{method:"POST",headers:authHeaders(),
        body:JSON.stringify({key:k, label:v.label, chapters:v.chapters})});
    }
    msg("导入完成","ok"); loadList();
  }catch(e){ msg("导入失败："+e.message,"err"); }
}

function esc(s){ return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

// 初始化
if(!getToken()){ document.getElementById("app").innerHTML='<div class="empty">请先在主站登录后再访问此页面（登录态通过浏览器共享）。</div>'; }
else{
  document.getElementById("loginInfo").textContent = "当前用户："+getUser();
  document.getElementById("btnNew").onclick = ()=>openEdit(null);
  document.getElementById("btnRefresh").onclick = loadList;
  document.getElementById("btnSeed").onclick = seedDefaults;
  document.getElementById("btnCalcCfg").onclick = openCalcCfg;
  document.getElementById("btnExamples").onclick = openExamples;
  document.getElementById("btnAiRules").onclick = openAiRules;
  loadList();
}
</script>
